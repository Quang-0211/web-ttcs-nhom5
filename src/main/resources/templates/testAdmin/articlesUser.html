<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4Stars - News Articles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-[#f8f9fa] text-[#333]">

    <div class="flex min-h-screen">
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col sticky top-0 h-screen">
            <div class="p-6">
                <h1 class="text-2xl font-bold text-blue-600 tracking-tight">4Stars</h1>
            </div>

            <nav class="flex-1 px-4 space-y-1 overflow-y-auto">
                <a href="#" class="flex items-center space-x-3 p-3 text-gray-500 hover:bg-gray-50 rounded-lg">
                    <i class="fas fa-home w-5"></i> <span>Home</span>
                </a>
                <a href="#" class="flex items-center space-x-3 p-3 text-gray-500 hover:bg-gray-50 rounded-lg">
                    <i class="fas fa-book w-5"></i> <span>Dictionary</span>
                </a>
                <a href="#" class="flex items-center space-x-3 p-3 text-gray-500 hover:bg-gray-50 rounded-lg">
                    <i class="fas fa-lightbulb w-5"></i> <span>Vocabulary</span>
                </a>
                <a href="#" class="flex items-center space-x-3 p-3 text-gray-500 hover:bg-gray-50 rounded-lg">
                    <i class="fas fa-sticky-note w-5"></i> <span>Notebook</span>
                </a>
                <a href="#" class="flex items-center space-x-3 p-3 text-gray-500 hover:bg-gray-50 rounded-lg">
                    <i class="fas fa-spell-check w-5"></i> <span>Grammar</span>
                </a>

                <a href="#"
                    class="flex items-center space-x-3 p-3 bg-blue-50 text-blue-600 rounded-lg border border-blue-100">
                    <i class="fas fa-list-alt w-5"></i> <span class="font-medium">Blog</span>
                </a>

                <a href="#" class="flex items-center space-x-3 p-3 text-gray-500 hover:bg-gray-50 rounded-lg">
                    <i class="fas fa-play-circle w-5"></i> <span>Video</span>
                </a>
                <a href="#" class="flex items-center space-x-3 p-3 text-gray-500 hover:bg-gray-50 rounded-lg">
                    <i class="fas fa-headphones w-5"></i> <span>Dictation</span>
                </a>
                <a href="#" class="flex items-center space-x-3 p-3 text-gray-500 hover:bg-gray-50 rounded-lg">
                    <i class="fas fa-users w-5"></i> <span>Community</span>
                </a>
                <a href="#" class="flex items-center space-x-3 p-3 text-gray-500 hover:bg-gray-50 rounded-lg">
                    <i class="fas fa-store w-5"></i> <span>Store</span>
                </a>

                <a href="#" class="flex items-center space-x-3 p-3 text-gray-500 hover:bg-gray-50 rounded-lg mt-4">
                    <i class="far fa-user w-5"></i> <span>Profile</span>
                </a>
            </nav>

            <div class="p-4 border-t border-gray-100 space-y-3">
                <button class="flex items-center space-x-3 w-full text-gray-400 hover:text-gray-600 transition-colors">
                    <i class="fas fa-sign-out-alt w-5 text-red-400"></i>
                    <span class="text-sm">Đăng xuất</span>
                </button>
                <div class="flex items-center justify-between px-1">
                    <div class="flex items-center space-x-2 text-xs text-gray-400 cursor-pointer hover:text-gray-600">
                        <i class="fas fa-globe"></i> <span>EN</span>
                    </div>
                    <div class="flex items-center space-x-2 text-xs text-gray-400 cursor-pointer hover:text-gray-600">
                        <i class="fas fa-moon"></i>
                    </div>
                    <div class="flex items-center space-x-2 text-xs text-gray-400 cursor-pointer hover:text-gray-600">
                        <i class="fas fa-bell"></i>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 p-8">
            <div class="max-w-6xl mx-auto">
                <h2 class="text-3xl font-bold text-center text-gray-800 mb-8">News Articles</h2>

                <div
                    class="flex items-center space-x-2 text-sm text-gray-400 mb-10 bg-white p-3 rounded-lg shadow-sm inline-flex">
                    <i class="fas fa-home"></i>
                    <span class="mx-1">/</span>
                    <span class="hover:text-blue-500 cursor-pointer">Articles</span>
                    <span class="mx-1">/</span>
                    <span class="text-gray-700 font-semibold">News Articles</span>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <div
                        class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden group hover:shadow-xl transition-all duration-300">
                        <div class="relative overflow-hidden">
                            <img src="https://images.unsplash.com/photo-1485827404703-89b55fcc595e?auto=format&fit=crop&w=800&q=80"
                                alt="AI"
                                class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-500">
                        </div>
                        <div class="p-6">
                            <h3
                                class="font-bold text-lg text-gray-800 mb-2 group-hover:text-blue-600 transition-colors">
                                How will AI Change the World?</h3>
                            <p class="text-sm text-gray-500 line-clamp-2 leading-relaxed mb-6">Trí tuệ nhân tạo đang
                                thay đổi cách chúng ta sống và làm việc mỗi ngày...</p>
                            <div class="text-[11px] font-mono text-gray-400 text-right">15:15:48 08/11/2025</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

</body>

</html>
