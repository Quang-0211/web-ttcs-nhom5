        <div th:fragment="content" class="flex-1 min-h-0 min-w-0 overflow-y-auto p-6 flex flex-col gap-6">
            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8 flex-1 flex flex-col">

                <!-- Page Title -->
                <div class="text-center mt-2 mb-4">
                    <h2 class="text-xl font-extrabold text-gray-700 tracking-wide uppercase" th:text="${category.name}">Category Name</h2>
                </div>

                <!-- Breadcrumbs -->
                <nav class="flex items-center justify-center text-sm font-medium text-gray-500 mb-6">
                    <a th:href="@{/home}" class="hover:text-blue-500 transition"><i class="fa fa-home"></i></a>
                    <span class="mx-2 text-gray-300">/</span>
                    <a th:href="@{/dictation}" class="hover:text-blue-500 transition">Dictation</a>
                    <span class="mx-2 text-gray-300">/</span>
                    <span class="text-gray-800 font-bold" th:text="${category.name}">Category</span>
                </nav>

                <!-- Search Bar -->
                <div class="flex justify-center mb-10 w-full">
                    <form th:action="@{/dictation/category/{id}(id=${category.id})}" method="get" 
                          class="relative w-full max-w-2xl">
                        <input type="text" name="search" th:value="${search}" placeholder="Search for a dictation..."
                               class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3.5 pl-5 pr-12 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 shadow-sm transition">
                        <button type="submit" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-500">
                            <i class="fa fa-search text-lg"></i>
                        </button>
                    </form>
                </div>

                <!-- Dictation Topics Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    
                    <div th:each="topic : ${topics}" 
                         class="bg-gray-50 rounded-3xl p-6 shadow-sm border border-gray-100 flex flex-col hover:shadow-md hover:border-gray-200 transition relative overflow-hidden group">
                        <div class="absolute top-0 right-0 p-4 opacity-5 group-hover:opacity-10 transition">
                            <i class="fa fa-headphones text-6xl text-blue-900"></i>
                        </div>

                        <h3 class="font-bold text-gray-900 text-lg mb-2 relative z-10" th:text="${topic.title}">Dictation Topic</h3>
                        <p class="text-sm text-gray-500 mb-6 flex-1 line-clamp-2 relative z-10" th:text="${topic.description == null || topic.description.isEmpty() ? 'Start practicing your listening skills with this dictation topic.' : topic.description}">
                            Topic description
                        </p>
                        
                        <a th:href="@{/dictation/{id}(id=${topic.id})}" class="bg-blue-500 text-white font-semibold py-2 px-6 rounded-lg text-sm self-start hover:bg-blue-600 transition shadow-sm hover:shadow-md active:transform active:scale-95 flex items-center gap-2 relative z-10">
                            <i class="fa fa-volume-up"></i> Start
                        </a>
                    </div>

                    <div th:if="${#lists.isEmpty(topics)}" class="col-span-full py-16 text-center text-gray-500 flex flex-col items-center">
                        <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mb-4">
                            <i class="fa fa-search text-3xl text-gray-400"></i>
                        </div>
                        <span class="text-xl font-medium text-gray-600">No dictation topics found</span>
                        <p class="text-sm mt-2 text-gray-400">Try adjusting your search keywords</p>
                    </div>
                </div>

            </div>
        </div>
