<!DOCTYPE html>
<html th:fragment="content" xmlns:th="http://www.thymeleaf.org">
<div class="flex-1 min-h-0 min-w-0 overflow-y-auto p-6 flex flex-col gap-6">
    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8 flex-1 flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-extrabold text-gray-800">Available Quizzes</h1>
        </div>

        <div class="flex-1 overflow-y-auto">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div th:each="quiz : ${quizzes}" class="bg-gray-50 rounded-2xl p-6 border border-gray-200 hover:border-blue-300 transition">
                    <h3 class="text-lg font-extrabold text-gray-800 mb-2" th:text="${quiz.title}"></h3>
                    <p class="text-gray-600 text-sm mb-4" th:text="${quiz.description}"></p>
                    <div class="flex justify-between items-center text-xs text-gray-500 mb-4">
                        <span th:text="${quiz.category != null ? quiz.category.name : 'General'}"></span>
                        <span th:text="${#temporals.format(quiz.created_at, 'MMM dd, yyyy')}"></span>
                    </div>
                    <a th:href="@{/quiz/{id}(id=${quiz.id})}" class="w-full px-4 py-2 bg-blue-500 text-white font-bold rounded-xl hover:bg-blue-600 transition text-center block">
                        Take Quiz
                    </a>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(quizzes)}" class="text-center py-12">
                <i class="fa fa-clipboard-list text-4xl text-gray-300 mb-4"></i>
                <p class="text-gray-500 font-bold">No quizzes available yet.</p>
            </div>
        </div>
    </div>
</div>
</html>
