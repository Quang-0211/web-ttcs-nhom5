<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' - English Pro' : 'English Pro'}">English Pro</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Chart.js (Home page) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>

    <!-- Alpine.js (Flashcards) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f3f4f6;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Sidebar active item state is handled by Tailwind classes in the fragment */

        /* CKEditor Rich Text Content Styles (Grammar Details) */
        .ck-content {
            color: #374151;
            line-height: 1.8;
            font-size: 1.05rem;
        }

        .ck-content h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #111827;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
        }

        .ck-content h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1f2937;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 0.5rem;
        }

        .ck-content h3 {
            font-size: 1.25rem;
            font-weight: 700;
            color: #374151;
            margin-top: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .ck-content p {
            margin-bottom: 1rem;
        }

        .ck-content ul {
            list-style-type: disc;
            padding-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .ck-content ol {
            list-style-type: decimal;
            padding-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .ck-content li {
            margin-bottom: 0.25rem;
        }

        .ck-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
            border: 1px solid #e5e7eb;
        }

        .ck-content th,
        .ck-content td {
            padding: 0.75rem;
            border: 1px solid #e5e7eb;
        }

        .ck-content th {
            background-color: #f9fafb;
            font-weight: 700;
            text-align: left;
        }

        .ck-content strong,
        .ck-content b {
            font-weight: 800;
            color: #111827;
        }

        .ck-content em,
        .ck-content i {
            font-style: italic;
            color: #4b5563;
        }

        .ck-content a {
            color: #3b82f6;
            text-decoration: underline;
        }

        .ck-content a:hover {
            color: #2563eb;
        }

        .ck-content blockquote {
            border-left: 4px solid #3b82f6;
            padding-left: 1rem;
            color: #4b5563;
            font-style: italic;
            background-color: #eff6ff;
            padding: 1rem;
            border-radius: 0 0.5rem 0.5rem 0;
            margin-bottom: 1rem;
        }

        .ck-content img {
            max-width: 100%;
            height: auto;
            border-radius: 0.5rem;
            margin: 1rem 0;
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div class="flex h-screen w-full overflow-hidden bg-gray-100">

        <!-- SIDEBAR -->
        <div th:replace="~{user/fragments/sidebar :: sidebar(${activeMenu != null ? activeMenu : 'home'})}"></div>

        <!-- MAIN CONTENT -->
        <div th:replace="~{${userPath} :: content}" class="flex-1 min-h-0 min-w-0 overflow-y-auto w-full"></div>

    </div>
</body>

</html>
