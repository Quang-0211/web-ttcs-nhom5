<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4Stars - News Articles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }

        /* Tùy chỉnh thanh cuộn cho mượt */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #e2e8f0;
            border-radius: 10px;
        }

        .article-card:hover .arrow-icon {
            transform: translateX(4px);
            opacity: 1;
        }
    </style>
</head>

<body class="text-[#1e293b] flex h-screen overflow-hidden">

    <!-- <aside th:replace="~{user/fragments/sidebar :: sidebar(${activeMenu != null ? activeMenu : 'home'})}" class="h-full border-r border-slate-100"></aside> -->

    <main th:fragment="content" class="flex-1 overflow-y-auto custom-scrollbar relative px-6 lg:px-10">

        <form method="get" th:action="@{/user/articles}" class="max-w-7xl mx-auto py-8">

            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                <nav
                    class="flex items-center space-x-2 text-sm text-slate-400 bg-white px-5 py-2.5 rounded-2xl shadow-sm border border-slate-100">
                    <a href="#" class="hover:text-blue-600 transition-colors"><i class="fas fa-home"></i></a>
                    <span class="text-slate-300">/</span>
                    <a href="#" class="hover:text-blue-600 transition-colors">Articles</a>
                    <span class="text-slate-300">/</span>
                    <span class="text-slate-800 font-semibold uppercase tracking-wider text-[11px]">News Articles</span>
                </nav>
            </div>

            <div class="sticky top-0 z-30 bg-[#f8fafc]/80 backdrop-blur-xl pt-2 pb-10">
                <div
                    class="bg-white p-2.5 rounded-[1.5rem] shadow-xl shadow-blue-900/5 border border-slate-100 flex flex-col md:flex-row gap-3">
                    <div class="relative flex-1">
                        <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" placeholder="Tìm kiếm tên bài viết..." name="keyword" th:value="${keyword}"
                            class="w-full pl-12 pr-4 py-3 bg-transparent border-none rounded-2xl focus:ring-0 outline-none text-slate-700 font-medium">
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <select name="categorySearch"
                            class="bg-slate-50 border border-slate-100 text-slate-600 rounded-2xl px-6 py-3 focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer transition-all font-semibold text-sm">
                            <option value="0">Tất cả danh mục</option>
                            <option th:each="i:${categorys}" th:value="${i.id}" th:text="${i.name}"
                                th:selected="${i.id == categorySearch}"></option>
                        </select>
                        <button type="submit"
                            class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-3 rounded-2xl font-bold transition-all shadow-lg shadow-blue-200 active:scale-95">
                            Tìm kiếm
                        </button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-16">

                <div th:each="article:${articles}"
                    class="article-card bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden group hover:shadow-2xl hover:shadow-blue-900/10 hover:-translate-y-2 transition-all duration-500 flex flex-col h-full">

                    <a th:href="@{'/user/article/'+${article.id}}" class="flex flex-col h-full">
                        <div class="relative overflow-hidden h-52">
                            <img th:src="${article.image}"
                                src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=600&q=80"
                                alt="post"
                                class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/30 to-transparent opacity-60">
                            </div>
                            <div th:text="${article.cateName}"
                                class="absolute top-5 left-5 bg-white px-4 py-1.5 rounded-full text-[10px] font-extrabold text-blue-600 uppercase tracking-widest shadow-sm">
                                Vocabulary
                            </div>
                        </div>

                        <div class="p-8 flex-1 flex flex-col">
                            <h3 th:text="${article.title}"
                                class="font-bold text-lg text-slate-800 mb-4 line-clamp-2 group-hover:text-blue-600 transition-colors leading-snug">
                                Mastering English: The Power of Consistency</h3>

                            <div class="mt-auto pt-6 border-t border-slate-50 flex items-center justify-between">
                                <div class="flex items-center gap-2.5">
                                    <div
                                        class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center text-blue-600 text-[10px] font-bold">
                                        AD
                                    </div>
                                    <span th:text="'Admin • '+${#temporals.format(article.createdAt, 'dd/MM/yyyy')}"
                                        class="text-[11px] font-medium text-slate-400">Admin • 18/04/2026</span>
                                </div>
                                <div class="arrow-icon opacity-0 -translate-x-2 transition-all duration-300">
                                    <i
                                        class="fas fa-arrow-right text-blue-600 bg-blue-50 w-8 h-8 flex items-center justify-center rounded-full text-xs"></i>
                                </div>
                            </div>
                        </div>
                    </a>
                </div>
            </div>

            <div class="flex justify-center items-center gap-3 border-t border-slate-100 pt-10 pb-20">
                <button type="submit" th:name="cnt" th:value="${cnt - 1}" th:if="${cnt > 0}"
                    class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white border border-slate-100 text-slate-400 hover:bg-blue-600 hover:text-white hover:shadow-lg hover:shadow-blue-200 transition-all">
                    <i class="fas fa-chevron-left text-sm"></i>
                </button>

                <div class="flex gap-2">
                    <input type="submit" th:name="cnt" th:value="${cnt}"
                        class="w-12 h-12 rounded-2xl bg-blue-600 text-white font-bold shadow-xl shadow-blue-200 cursor-pointer">

                    <input type="submit" th:name="cnt" th:value="${cnt + 1}"
                        class="w-12 h-12 rounded-2xl bg-white border border-slate-100 text-slate-600 hover:bg-slate-50 font-bold cursor-pointer transition-colors">

                    <input type="submit" th:name="cnt" th:value="${cnt + 2}"
                        class="w-12 h-12 rounded-2xl bg-white border border-slate-100 text-slate-600 hover:bg-slate-50 font-bold cursor-pointer transition-colors">
                </div>

                <button type="submit" th:name="cnt" th:value="${cnt + 1}"
                    class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white border border-slate-100 text-slate-400 hover:bg-blue-600 hover:text-white hover:shadow-lg hover:shadow-blue-200 transition-all">
                    <i class="fas fa-chevron-right text-sm"></i>
                </button>
            </div>

        </form>
    </main>

</body>

</html>
