        <div th:fragment="content" class="flex-1 min-h-0 min-w-0 overflow-y-auto p-6 flex flex-col gap-6">
            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8 flex-1 flex flex-col items-center">

                <div class="w-full max-w-4xl" th:if="${vocab != null}">

                    <a href="javascript:history.back()"
                        class="inline-flex items-center gap-2 text-gray-400 hover:text-blue-500 font-bold text-sm mb-6 transition">
                        <i class="fa fa-arrow-left"></i> Back
                    </a>

                    <div class="flex flex-col md:flex-row gap-10">

                        <!-- Left: Image -->
                        <div class="w-full md:w-[400px] shrink-0">
                            <div
                                class="rounded-2xl overflow-hidden shadow-sm border border-gray-100 bg-gray-50 aspect-[4/3] flex items-center justify-center">
                                <img th:if="${vocab.image != null}" th:src="${vocab.image}"
                                    class="w-full h-full object-cover" />
                                <div th:unless="${vocab.image != null}" class="text-gray-400 font-medium text-sm">No
                                    Image</div>
                            </div>
                        </div>

                        <!-- Right: Details -->
                        <div class="flex-1 flex flex-col justify-center py-2">
                            <div class="mb-4">
                                <span
                                    class="inline-block px-2.5 py-1 bg-blue-50 text-blue-500 border border-blue-100 rounded text-[11px] uppercase font-bold tracking-wide"
                                    th:text="${vocab.partOfSpeech}">noun</span>
                            </div>

                            <div class="flex items-center gap-4 mb-2">
                                <h1 class="text-4xl font-extrabold text-gray-800" th:text="${vocab.word}">Lion</h1>
                                <button th:data-audio="${vocab.audio}" th:data-word="${vocab.word}"
                                    onclick="playAudio(event, this.getAttribute('data-audio'), this.getAttribute('data-word'))"
                                    class="w-10 h-10 rounded-full flex items-center justify-center text-blue-500 hover:bg-blue-50 transition border border-blue-100 shadow-sm">
                                    <i class="fa fa-volume-up text-lg"></i>
                                </button>
                            </div>

                            <p class="text-gray-400 font-bold text-lg mb-4 tracking-wide"
                                th:text="${vocab.pronunciation}">/ˈlaɪ.ən/</p>

                            <div class="mb-8">
                                <span
                                    class="inline-block px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-[11px] font-bold shadow-sm border border-blue-100 uppercase"
                                    th:text="${vocab.category != null ? vocab.category.name : ''}">Animals</span>
                            </div>

                            <!-- Definitions -->
                            <div class="space-y-6 flex-1">
                                <div>
                                    <h3 class="font-extrabold text-blue-500 mb-1 text-[13px] uppercase tracking-wider">
                                        Meaning (VI)</h3>
                                    <p class="text-gray-800 font-bold text-[15px]" th:text="${vocab.meaningVi}">Sư tử
                                    </p>
                                </div>

                                <div>
                                    <h3 class="font-extrabold text-blue-600 mb-1 text-[13px] uppercase tracking-wider">
                                        Definition (EN)</h3>
                                    <p class="text-gray-700 font-bold text-[15px]" th:text="${vocab.definitionEn}">A
                                        large wild cat.</p>
                                </div>

                                <div class="bg-gray-50 rounded-xl p-5 border border-gray-100 shadow-sm mt-4">
                                    <h3 class="font-extrabold text-gray-700 mb-3 text-[13px] uppercase tracking-wider">
                                        Example Settings</h3>
                                    <p class="text-gray-800 font-bold mb-1.5" th:text="${vocab.exampleEn}">The lion is
                                        strong.</p>
                                    <p class="text-gray-500 font-medium italic text-sm" th:text="${vocab.exampleVi}">Sư
                                        tử rất mạnh.</p>
                                </div>
                            </div>

                        </div>
                    </div>

                </div>

                <div th:unless="${vocab != null}" class="flex-1 w-full flex items-center justify-center">
                    <p class="text-gray-400 font-bold">Vocabulary not found.</p>
                </div>
            </div>
        </div>

    <script th:inline="javascript">
        let currentAudio = null;
        function playAudio(event, url, wordText) {
            event.preventDefault();
            event.stopPropagation();
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
            }
            if (url && url !== 'null' && url.trim() !== '') {
                currentAudio = new Audio(url);
                currentAudio.play().catch(e => console.error(e));
            } else if (wordText && window.speechSynthesis) {
                const utterance = new SpeechSynthesisUtterance(wordText);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            } else {
                alert("No audio available");
            }
        }
    </script>
