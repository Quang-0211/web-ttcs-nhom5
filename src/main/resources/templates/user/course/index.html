<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<body>
    <div th:fragment="content" class="flex-1 overflow-y-auto bg-[#f8fafc]">
        <div class="max-w-7xl mx-auto px-6 lg:px-10 py-10">
            <div class="flex flex-col lg:flex-row justify-between gap-6 lg:items-end mb-8">
                <div>
                    <p class="text-sm font-semibold uppercase tracking-[0.25em] text-blue-600 mb-2">Learning paths</p>
                    <h1 class="text-3xl font-black text-slate-900">Khóa học tiếng Anh</h1>
                    <p class="text-slate-500 mt-2 max-w-2xl">Danh sách khóa học với video và bài viết đi kèm để học theo lộ trình.</p>
                </div>
                <form th:action="@{/courses}" method="get" class="flex gap-3">
                    <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm khóa học..."
                        class="px-4 py-3 rounded-2xl border border-slate-200 bg-white outline-none focus:ring-2 focus:ring-blue-500 min-w-[240px]">
                    <button type="submit" class="px-6 py-3 rounded-2xl bg-blue-600 text-white font-bold">Tìm</button>
                </form>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                <a th:each="course : ${courses}" th:href="@{'/courses/' + ${course.id}}"
                    class="group bg-white rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-2xl hover:shadow-blue-900/10 transition-all overflow-hidden">
                    <div class="h-52 overflow-hidden">
                        <img th:src="${course.thumbnail != null ? course.thumbnail : 'https://images.unsplash.com/photo-1523240795612-9a054b0db644?auto=format&fit=crop&w=1200&q=80'}"
                            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" alt="course">
                    </div>
                    <div class="p-6 space-y-4">
                        <div class="flex items-center justify-between gap-3">
                            <span class="text-[11px] font-black uppercase tracking-[0.3em] text-blue-600" th:text="${course.level}">Beginner</span>
                            <span class="text-xs font-semibold text-slate-400" th:text="${course.durationHours + ' hours'}">10 hours</span>
                        </div>
                        <h3 class="text-xl font-extrabold text-slate-900 group-hover:text-blue-600 transition-colors" th:text="${course.title}">Course title</h3>
                        <p class="text-sm text-slate-500 line-clamp-3" th:text="${course.description}">Course description</p>
                    </div>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
