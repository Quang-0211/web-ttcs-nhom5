<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4Stars Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Ẩn thanh cuộn cho Chrome, Safari và Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Ẩn thanh cuộn cho IE, Edge và Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }
    </style>
</head>

<body>
    <aside th:fragment="menu"
        class="w-72 bg-white border-r border-gray-100 flex flex-col sticky top-0 h-screen shadow-sm">

        <div class="p-8">
            <h1 class="text-2xl font-black text-blue-600 tracking-tighter flex items-center gap-2">
                <i class="fas fa-star text-yellow-400 text-sm"></i> 4Stars
            </h1>
        </div>

        <nav class="flex-1 px-4 space-y-1.5 overflow-y-auto no-scrollbar">
            <a href="#"
                class="flex items-center space-x-3 p-3 text-gray-500 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-all duration-200">
                <i class="fas fa-house-user w-5"></i> <span class="text-sm font-semibold">Home</span>
            </a>
            <a href="#"
                class="flex items-center space-x-3 p-3 text-gray-500 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-all duration-200">
                <i class="fas fa-book-open w-5"></i> <span class="text-sm font-semibold">Dictionary</span>
            </a>
            <a href="#"
                class="flex items-center space-x-3 p-3 text-gray-500 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-all duration-200">
                <i class="fas fa-bolt w-5"></i> <span class="text-sm font-semibold">Vocabulary</span>
            </a>
            <a href="#"
                class="flex items-center space-x-3 p-3 text-gray-500 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-all duration-200">
                <i class="fas fa-layer-group w-5"></i> <span class="text-sm font-semibold">Notebook</span>
            </a>
            <a href="#"
                class="flex items-center space-x-3 p-3 text-gray-500 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-all duration-200">
                <i class="fas fa-feather-alt w-5"></i> <span class="text-sm font-semibold">Grammar</span>
            </a>

            <a href="#"
                class="flex items-center space-x-3 p-3 bg-blue-600 text-white rounded-xl shadow-lg shadow-blue-100">
                <i class="fas fa-newspaper w-5"></i> <span class="text-sm font-bold">Blog</span>
            </a>

            <a href="#"
                class="flex items-center space-x-3 p-3 text-gray-500 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-all duration-200">
                <i class="fas fa-circle-play w-5"></i> <span class="text-sm font-semibold">Video</span>
            </a>
            <a href="#"
                class="flex items-center space-x-3 p-3 text-gray-500 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-all duration-200">
                <i class="fas fa-ear-listen w-5"></i> <span class="text-sm font-semibold">Dictation</span>
            </a>
            <a href="#"
                class="flex items-center space-x-3 p-3 text-gray-500 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-all duration-200">
                <i class="fas fa-comment-dots w-5"></i> <span class="text-sm font-semibold">Community</span>
            </a>
        </nav>

        <div class="p-4 mx-4 mb-4 bg-gray-50 rounded-2xl border border-gray-100">
            <div class="flex items-center space-x-3 mb-4">
                <div class="relative">
                    <img src="https://ui-avatars.com/api/?name=Quang+Tran&background=0D8ABC&color=fff" alt="Avatar"
                        class="w-10 h-10 rounded-full border-2 border-white shadow-sm">
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full">
                    </div>
                </div>
                <div class="overflow-hidden">
                    <p class="text-sm font-bold text-gray-800 truncate">Quang Tran</p>
                    <p class="text-[10px] text-gray-500 font-medium">B23DCCN695</p>
                </div>
            </div>

            <div class="flex items-center justify-between pt-3 border-t border-gray-200/60">
                <button class="text-gray-400 hover:text-red-500 transition-colors" title="Đăng xuất">
                    <i class="fas fa-power-off text-sm"></i>
                </button>
                <div class="flex items-center space-x-3">
                    <i class="fas fa-circle-half-stroke text-gray-400 cursor-pointer hover:text-blue-600 text-sm"></i>
                    <i class="fas fa-bell text-gray-400 cursor-pointer hover:text-blue-600 text-sm"></i>
                </div>
            </div>
        </div>
    </aside>

</body>

</html>
