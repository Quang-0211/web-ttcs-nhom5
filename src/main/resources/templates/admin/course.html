<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<body>
    <div th:fragment="content" class="flex-1 p-6 overflow-y-auto bg-gray-50">
        <form th:action="@{/admin/courses}" method="get" class="space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm">
                <div class="flex flex-col md:flex-row gap-4 md:items-end">
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Keyword</label>
                        <input type="text" name="keyword" th:value="${keyword}" placeholder="Search course title..."
                            class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm">
                    </div>
                    <button type="submit"
                        class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 text-sm font-medium">
                        Query
                    </button>
                    <button type="button" onclick="openCourseModal('create')"
                        class="px-4 py-2 bg-emerald-600 text-white rounded-md hover:bg-emerald-700 text-sm font-medium">
                        Create Course
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100">
                <div class="p-4 border-b flex justify-between items-center">
                    <h3 class="font-bold text-gray-800">Course List</h3>
                    <span class="text-sm text-gray-500" th:text="${courses.size() + ' items'}">0 items</span>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-50 text-gray-600 text-xs uppercase tracking-wider">
                            <tr>
                                <th class="p-4 font-semibold border-b">ID</th>
                                <th class="p-4 font-semibold border-b">Thumbnail</th>
                                <th class="p-4 font-semibold border-b">Title</th>
                                <th class="p-4 font-semibold border-b">Level</th>
                                <th class="p-4 font-semibold border-b">Duration</th>
                                <th class="p-4 font-semibold border-b text-center">Status</th>
                                <th class="p-4 font-semibold border-b text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody class="text-gray-700 text-sm">
                            <tr class="border-b hover:bg-gray-50 transition-colors" th:each="course : ${courses}">
                                <td class="p-4" th:text="${course.id}">1</td>
                                <td class="p-4">
                                    <img th:src="${course.thumbnail != null ? course.thumbnail : 'https://via.placeholder.com/160x90'}"
                                        class="w-32 h-20 rounded-lg object-cover border" alt="course thumb">
                                </td>
                                <td class="p-4">
                                    <div class="font-semibold text-gray-800" th:text="${course.title}">Course title</div>
                                    <p class="text-xs text-gray-500 line-clamp-2" th:text="${course.description}">Description</p>
                                </td>
                                <td class="p-4" th:text="${course.level}">Beginner</td>
                                <td class="p-4" th:text="${course.durationHours + ' hours'}">10 hours</td>
                                <td class="p-4 text-center">
                                    <span class="px-2 py-1 rounded-full text-xs font-medium"
                                        th:classappend="${course.status} ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600'"
                                        th:text="${course.status} ? 'Active' : 'Disabled'">Active</span>
                                </td>
                                <td class="p-4 text-center">
                                    <div class="flex justify-center gap-2">
                                        <button type="button"
                                            th:attr="data-id=${course.id},data-title=${course.title},data-description=${course.description},data-thumbnail=${course.thumbnail},data-level=${course.level},data-duration=${course.durationHours},data-status=${course.status}"
                                            onclick="openCourseModal('update', this.dataset.id, this.dataset.title, this.dataset.description, this.dataset.thumbnail, this.dataset.level, this.dataset.duration, this.dataset.status)"
                                            class="p-2 text-gray-400 hover:text-blue-500 transition-colors">
                                            <i class="fa fa-edit text-lg"></i>
                                        </button>
                                        <button type="button" th:attr="onclick=|deleteCourse(${course.id})|"
                                            class="p-2 text-gray-400 hover:text-red-500 transition-colors">
                                            <i class="fa fa-trash text-lg"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </form>

        <div id="courseModal"
            class="fixed inset-0 bg-gray-900 bg-opacity-60 z-50 hidden flex items-center justify-center transition-all duration-300 opacity-0 pointer-events-none">
            <form th:action="@{/admin/courses}" method="post" enctype="multipart/form-data"
                class="bg-white rounded-xl shadow-xl w-[70%] max-w-[900px] overflow-hidden transform scale-95 transition-transform duration-300">
                <div class="p-5 border-b flex justify-between items-center">
                    <h3 id="courseModalTitle" class="text-xl font-semibold text-gray-800">Add a new Course</h3>
                    <button onclick="closeCourseModal()" type="button"
                        class="text-gray-400 hover:text-red-500 transition-colors">
                        <i class="fa fa-times text-xl"></i>
                    </button>
                </div>
                <div class="p-6 space-y-5 max-h-[70vh] overflow-y-auto">
                    <input type="hidden" id="courseId" name="courseId">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Title</label>
                        <input type="text" id="courseTitle" name="title"
                            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 outline-none focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Description</label>
                        <textarea id="courseDescription" name="description" rows="5"
                            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 outline-none focus:ring-blue-500 focus:border-blue-500"></textarea>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Level</label>
                            <input type="text" id="courseLevel" name="level" value="Beginner"
                                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 outline-none focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Duration (hours)</label>
                            <input type="number" id="courseDuration" name="durationHours" value="0"
                                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 outline-none focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Status</label>
                            <select id="courseStatus" name="status"
                                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 outline-none bg-white focus:ring-blue-500 focus:border-blue-500">
                                <option value="true">Active</option>
                                <option value="false">Disabled</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Thumbnail</label>
                        <input type="file" id="courseThumbnailInput" accept="image/*" name="thumbnail"
                            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 outline-none bg-white">
                        <img id="courseThumbnailPreview" class="mt-3 w-44 h-28 object-cover rounded-lg border hidden">
                    </div>
                </div>
                <div class="p-5 border-t bg-gray-50 flex justify-end gap-3">
                    <button onclick="closeCourseModal()" type="button"
                        class="px-5 py-2 border border-gray-300 rounded-lg text-sm hover:bg-white text-gray-700">Cancel</button>
                    <button type="submit"
                        class="px-6 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">Save</button>
                </div>
            </form>
        </div>

        <script>
            let courseModal = null;
            let courseModalDialog = null;
            function openCourseModal(type, id = '', title = '', description = '', thumbnail = '', level = 'Beginner', durationHours = 0, status = true) {
                courseModal = document.getElementById('courseModal');
                courseModalDialog = courseModal.querySelector('.transform');
                courseModal.classList.remove('hidden', 'pointer-events-none');
                courseModal.classList.add('pointer-events-auto');
                setTimeout(() => {
                    courseModal.classList.remove('opacity-0');
                    courseModal.classList.add('opacity-100');
                    courseModalDialog.classList.remove('scale-95');
                    courseModalDialog.classList.add('scale-100');
                }, 10);
                document.getElementById('courseId').value = type === 'create' ? '' : id;
                document.getElementById('courseTitle').value = type === 'create' ? '' : title;
                document.getElementById('courseDescription').value = type === 'create' ? '' : description;
                document.getElementById('courseLevel').value = type === 'create' ? 'Beginner' : level;
                document.getElementById('courseDuration').value = type === 'create' ? '0' : durationHours;
                document.getElementById('courseStatus').value = type === 'create' ? 'true' : String(status);
                const preview = document.getElementById('courseThumbnailPreview');
                if (thumbnail) {
                    preview.src = thumbnail;
                    preview.classList.remove('hidden');
                } else {
                    preview.classList.add('hidden');
                }
            }
            function closeCourseModal() {
                if (!courseModal || !courseModalDialog) return;
                courseModalDialog.classList.remove('scale-100');
                courseModalDialog.classList.add('scale-95');
                courseModal.classList.remove('opacity-100');
                courseModal.classList.add('opacity-0');
                courseModal.classList.add('pointer-events-none');
                courseModal.classList.remove('pointer-events-auto');
                setTimeout(() => courseModal.classList.add('hidden'), 300);
            }
            const courseThumbInput = document.getElementById('courseThumbnailInput');
            if (courseThumbInput) {
                courseThumbInput.addEventListener('change', function (e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const preview = document.getElementById('courseThumbnailPreview');
                    preview.src = URL.createObjectURL(file);
                    preview.classList.remove('hidden');
                });
            }
            function deleteCourse(id) {
                if (!confirm('Delete this course?')) return;
                fetch('/admin/courses/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'courseId=' + encodeURIComponent(id)
                }).then(() => window.location.reload());
            }
        </script>
    </div>
</body>
</html>
