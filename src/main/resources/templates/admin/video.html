<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<body>
    <div th:fragment="content" class="flex-1 p-6 overflow-y-auto bg-gray-50">
        <form th:action="@{/admin/videos}" method="get" class="space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm">
                <div class="flex flex-col md:flex-row gap-4 md:items-end">
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Keyword</label>
                        <input type="text" name="keyword" th:value="${keyword}" placeholder="Search video title..."
                            class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm">
                    </div>
                    <button type="submit"
                        class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 text-sm font-medium">
                        Query
                    </button>
                    <button type="button" onclick="openVideoModal('create')"
                        class="px-4 py-2 bg-emerald-600 text-white rounded-md hover:bg-emerald-700 text-sm font-medium">
                        Create Video
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100">
                <div class="p-4 border-b flex justify-between items-center">
                    <h3 class="font-bold text-gray-800">Video List</h3>
                    <span class="text-sm text-gray-500" th:text="${videos.size() + ' items'}">0 items</span>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-50 text-gray-600 text-xs uppercase tracking-wider">
                            <tr>
                                <th class="p-4 font-semibold border-b">ID</th>
                                <th class="p-4 font-semibold border-b">Thumbnail</th>
                                <th class="p-4 font-semibold border-b">Title</th>
                                <th class="p-4 font-semibold border-b">Category</th>
                                <th class="p-4 font-semibold border-b">Duration</th>
                                <th class="p-4 font-semibold border-b text-center">Status</th>
                                <th class="p-4 font-semibold border-b text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody class="text-gray-700 text-sm">
                            <tr class="border-b hover:bg-gray-50 transition-colors" th:each="video : ${videos}">
                                <td class="p-4" th:text="${video.id}">1</td>
                                <td class="p-4">
                                    <img th:src="${video.thumbnail != null ? video.thumbnail : 'https://via.placeholder.com/160x90'}"
                                        class="w-32 h-20 rounded-lg object-cover border" alt="video thumb">
                                </td>
                                <td class="p-4">
                                    <div class="font-semibold text-gray-800" th:text="${video.title}">Video title</div>
                                    <p class="text-xs text-gray-500 line-clamp-2" th:text="${video.description}">
                                        Description</p>
                                </td>
                                <td class="p-4" th:text="${video.Category != null ? video.category.name : 'No course'}">
                                    Category</td>
                                <td class="p-4" th:text="${video.duration + ' min'}">30 min</td>
                                <td class="p-4 text-center">
                                    <span class="px-2 py-1 rounded-full text-xs font-medium"
                                        th:classappend="${video.status} ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600'"
                                        th:text="${video.status} ? 'Active' : 'Disabled'">Active</span>
                                </td>
                                <td class="p-4 text-center">
                                    <div class="flex justify-center gap-2">
                                        <button type="button"
                                            th:attr="data-id=${video.id},data-title=${video.title},data-url=${video.url},data-thumbnail=${video.thumbnail},data-duration=${video.duration},data-subtitle=${video.subtitle},data-description=${video.description},data-courseid=${video.category != null ? video.category.id : 0},data-status=${video.status}"
                                            onclick="openVideoModal('update', this.dataset.id, this.dataset.title, this.dataset.url, this.dataset.thumbnail, this.dataset.duration, this.dataset.subtitle, this.dataset.description, this.dataset.courseid, this.dataset.status)"
                                            class="p-2 text-gray-400 hover:text-blue-500 transition-colors">
                                            <i class="fa fa-edit text-lg"></i>
                                        </button>
                                        <button type="button" th:attr="onclick=|deleteVideo(${video.id})|"
                                            class="p-2 text-gray-400 hover:text-red-500 transition-colors">
                                            <i class="fa fa-trash text-lg"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </form>

        <div id="videoModal"
            class="fixed inset-0 bg-gray-900 bg-opacity-60 z-50 hidden flex items-center justify-center transition-all duration-300 opacity-0 pointer-events-none">
            <form th:action="@{/admin/videos}" method="post" enctype="multipart/form-data"
                class="bg-white rounded-xl shadow-xl w-[75%] max-w-[980px] overflow-hidden transform scale-95 transition-transform duration-300">
                <div class="p-5 border-b flex justify-between items-center">
                    <h3 id="videoModalTitle" class="text-xl font-semibold text-gray-800">Add a new Video</h3>
                    <button onclick="closeVideoModal()" type="button"
                        class="text-gray-400 hover:text-red-500 transition-colors">
                        <i class="fa fa-times text-xl"></i>
                    </button>
                </div>
                <div class="p-6 space-y-5 max-h-[70vh] overflow-y-auto">
                    <input type="hidden" id="videoId" name="videoId">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Title</label>
                            <input type="text" id="videoTitle" name="title"
                                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 outline-none focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Video URL</label>
                            <input type="text" id="videoUrl" name="url" placeholder="https://..."
                                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 outline-none focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Category</label>
                            <select id="videoCateId" name="cateId"
                                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 outline-none bg-white focus:ring-blue-500 focus:border-blue-500">
                                <option th:each="cate : ${categories}" th:value="${cate.id}" th:text="${cate.name}">
                                </option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Duration (min)</label>
                            <input type="number" id="videoDuration" name="duration" value="0"
                                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 outline-none focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Status</label>
                            <select id="videoStatus" name="status"
                                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 outline-none bg-white focus:ring-blue-500 focus:border-blue-500">
                                <option value="true">Active</option>
                                <option value="false">Disabled</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Subtitle</label>
                        <textarea id="videoSubtitle" name="subtitle" rows="5"
                            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 outline-none focus:ring-blue-500 focus:border-blue-500"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Description</label>
                        <textarea id="videoDescription" name="description" rows="4"
                            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 outline-none focus:ring-blue-500 focus:border-blue-500"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Thumbnail</label>
                        <input type="file" id="videoThumbnailInput" accept="image/*" name="thumbnail"
                            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 outline-none bg-white">
                        <img id="videoThumbnailPreview" class="mt-3 w-44 h-28 object-cover rounded-lg border hidden">
                    </div>
                </div>
                <div class="p-5 border-t bg-gray-50 flex justify-end gap-3">
                    <button onclick="closeVideoModal()" type="button"
                        class="px-5 py-2 border border-gray-300 rounded-lg text-sm hover:bg-white text-gray-700">Cancel</button>
                    <button type="submit"
                        class="px-6 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">Save</button>
                </div>
            </form>
        </div>

        <script>
            let videoModal = null;
            let videoModalDialog = null;
            function openVideoModal(type, id = '', title = '', url = '', thumbnail = '', duration = 0, subtitle = '', description = '', CateId = 0, status = true) {
                videoModal = document.getElementById('videoModal');
                videoModalDialog = videoModal.querySelector('.transform');
                videoModal.classList.remove('hidden', 'pointer-events-none');
                videoModal.classList.add('pointer-events-auto');
                setTimeout(() => {
                    videoModal.classList.remove('opacity-0');
                    videoModal.classList.add('opacity-100');
                    videoModalDialog.classList.remove('scale-95');
                    videoModalDialog.classList.add('scale-100');
                }, 10);
                document.getElementById('videoId').value = type === 'create' ? '' : id;
                document.getElementById('videoTitle').value = type === 'create' ? '' : title;
                document.getElementById('videoUrl').value = type === 'create' ? '' : url;
                document.getElementById('videoDuration').value = type === 'create' ? '0' : duration;
                document.getElementById('videoSubtitle').value = type === 'create' ? '' : subtitle;
                document.getElementById('videoDescription').value = type === 'create' ? '' : description;
                document.getElementById('videoCateId').value = type === 'create' ? '0' : String(CateId || '0');
                document.getElementById('videoStatus').value = type === 'create' ? 'true' : String(status);
                const preview = document.getElementById('videoThumbnailPreview');
                if (thumbnail) {
                    preview.src = thumbnail;
                    preview.classList.remove('hidden');
                } else {
                    preview.classList.add('hidden');
                }
            }
            function closeVideoModal() {
                if (!videoModal || !videoModalDialog) return;
                videoModalDialog.classList.remove('scale-100');
                videoModalDialog.classList.add('scale-95');
                videoModal.classList.remove('opacity-100');
                videoModal.classList.add('opacity-0');
                videoModal.classList.add('pointer-events-none');
                videoModal.classList.remove('pointer-events-auto');
                setTimeout(() => videoModal.classList.add('hidden'), 300);
            }
            const videoThumbInput = document.getElementById('videoThumbnailInput');
            if (videoThumbInput) {
                videoThumbInput.addEventListener('change', function (e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const preview = document.getElementById('videoThumbnailPreview');
                    preview.src = URL.createObjectURL(file);
                    preview.classList.remove('hidden');
                });
            }
            function deleteVideo(id) {
                if (!confirm('Delete this video?')) return;
                fetch('/admin/videos/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'videoId=' + encodeURIComponent(id)
                }).then(() => window.location.reload());
            }
        </script>
    </div>
</body>

</html>
