<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<!-- Modal Form -->
<div th:fragment="modal">
    <div id="addModal"
        class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm hidden z-50 flex items-center justify-center transition-opacity duration-300 opacity-0 overflow-y-auto py-10">
        <div id="modalDialog"
            class="bg-white rounded-2xl shadow-xl w-full max-w-2xl transform transition-all duration-300 scale-95 flex flex-col my-auto max-h-full">
            <div class="px-6 py-4 border-b shrink-0 flex justify-between items-center">
                <h3 class="text-lg font-bold text-gray-800" id="modalTitle">Create New Dictation</h3>
                <button onclick="closeAddModal()" type="button"
                    class="text-gray-400 hover:text-gray-700 p-1.5 rounded-lg hover:bg-gray-100 transition"><i
                        class="fa fa-times"></i></button>
            </div>
            <form id="addForm" class="flex flex-col overflow-hidden" onsubmit="submitForm(event)">
                <input type="hidden" name="id" id="topicIdInput">
                <div class="p-6 overflow-y-auto custom-scrollbar flex-1 space-y-5">

                    <div class="grid grid-cols-2 gap-4 border-b pb-4">
                        <div class="col-span-2 sm:col-span-1">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Title <span
                                    class="text-red-500">*</span></label>
                            <input type="text" name="title" required
                                class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-100 focus:border-blue-400 outline-none transition shadow-sm text-sm"
                                placeholder="Ex: English Conversation 1">
                        </div>
                        <div class="col-span-2 sm:col-span-1">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Category <span
                                    class="text-red-500">*</span></label>
                            <select name="categoryId" required
                                class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-100 focus:border-blue-400 outline-none transition shadow-sm text-sm bg-white"></select>
                        </div>
                        <div class="col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                            <textarea name="description" rows="2"
                                class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-100 focus:border-blue-400 outline-none transition shadow-sm text-sm"
                                placeholder="Topic description..."></textarea>
                        </div>
                    </div>

                    <!-- Dynamic Sentences -->
                    <div>
                        <div class="flex justify-between items-center mb-3">
                            <label class="block text-sm font-bold text-gray-800"><i
                                    class="fa fa-list-ol mr-1 text-blue-500"></i> Sentences <span
                                    class="text-red-500">*</span></label>
                            <button type="button" onclick="addSentenceBlock()"
                                class="px-3 py-1 bg-blue-50 text-blue-600 rounded hover:bg-blue-100 font-medium text-xs flex items-center gap-1 transition"><i
                                    class="fa fa-plus"></i> Add Sentence</button>
                        </div>
                        <div id="sentenceContainer" class="space-y-3">
                        </div>
                    </div>
                </div>
                <div class="flex justify-end gap-3 pt-4 pb-6 px-6 border-t mt-4">
                    <button type="button" onclick="closeAddModal()"
                        class="px-5 py-2.5 text-gray-600 bg-white border border-gray-300 rounded hover:bg-gray-50 text-sm font-medium">Cancel</button>
                    <button type="submit" id="submitBtn"
                        class="px-5 py-2.5 text-white bg-blue-500 rounded hover:bg-blue-600 text-sm font-medium shadow-sm">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>
</html>
