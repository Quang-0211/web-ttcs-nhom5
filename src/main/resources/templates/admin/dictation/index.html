<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="content" class="flex-1 min-h-0 min-w-0 w-full h-full flex flex-col bg-gray-50/50 overflow-y-auto"
    x-data="dictationApp()">

    <!-- Header / Toggle -->
    <div class="bg-white px-6 pt-3 border-b shrink-0 flex items-end">
        <div class="flex gap-6 relative -mb-[1px]">
            <button
                class="px-4 py-2 text-blue-600 border-b-2 border-blue-600 font-medium text-sm tracking-wide transition-colors">Dictation
                List</button>
        </div>
    </div>

    <div class="flex flex-1 overflow-hidden m-6 gap-6 min-h-0 min-w-0">
        <!-- Sidebar -->
        <div th:replace="~{admin/dictation/sidebar :: sidebar}"></div>

        <div
            class="flex-1 bg-white rounded shadow-sm flex flex-col border border-gray-100 overflow-hidden relative min-w-0 min-h-0">
            <div class="p-4 border-b bg-white flex flex-wrap items-center gap-6 text-sm z-20 relative">
                <div class="flex items-center gap-2">
                    <span class="text-gray-600">Name:</span>
                    <input type="text" id="searchName" placeholder="Search topic..."
                        class="border rounded px-3 py-1.5 w-48 focus:ring-1 focus:ring-blue-500 outline-none text-gray-800"
                        onkeyup="if(event.key === 'Enter') { currentPage = 1; applyFilters(); }">
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-gray-600">Created at:</span>
                    <div class="flex items-center border rounded bg-white text-gray-600 overflow-hidden">
                        <input type="text" id="searchDateFrom" placeholder="From" onfocus="(this.type='date')"
                            onblur="if(!this.value) this.type='text'"
                            class="px-2 py-1.5 w-[130px] outline-none border-none bg-transparent text-sm">
                        <i class="fa fa-arrow-right mx-2 text-xs text-gray-400"></i>
                        <input type="text" id="searchDateTo" placeholder="To" onfocus="(this.type='date')"
                            onblur="if(!this.value) this.type='text'"
                            class="px-2 py-1.5 w-[130px] outline-none border-none bg-transparent text-sm">
                    </div>
                </div>
                <div class="ml-auto flex gap-3">
                    <button onclick="currentPage = 1; applyFilters()"
                        class="px-4 py-1.5 bg-blue-500 text-white rounded font-medium shadow-sm hover:bg-blue-600 transition">Query</button>
                </div>
            </div>

            <div class="p-4 flex justify-between items-center bg-white border-b border-gray-50 z-10 relative">
                <h3 class="font-bold text-gray-800 text-lg">Dictation Management</h3>
                <div class="flex items-center gap-3">
                    <button onclick="openAddModal()"
                        class="bg-blue-500 text-white px-4 py-1.5 rounded flex items-center gap-1.5 text-sm font-medium hover:bg-blue-600 transition shadow-sm">
                        <i class="fa fa-plus text-sm"></i> Create
                    </button>
                    <button
                        class="w-8 h-8 rounded border border-gray-200 hover:bg-gray-100 text-gray-600 flex items-center justify-center transition"
                        onclick="window.location.reload()" title="Refresh"><i class="fa fa-redo text-sm"></i></button>
                </div>
            </div>

            <div class="flex-1 overflow-auto relative">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-gray-50 border-b border-t text-gray-700 sticky top-0 z-10">
                        <tr>
                            <th class="px-4 py-3 font-medium w-12 text-center">ID</th>
                            <th class="px-4 py-3 font-medium text-left">Title</th>
                            <th class="px-4 py-3 font-medium text-left">Created At</th>
                            <th class="px-4 py-3 font-medium text-left">Updated At</th>
                            <th class="px-4 py-3 font-medium text-center w-24">Action</th>
                        </tr>
                    </thead>
                    <tbody id="dictationTableBody" class="text-gray-700">
                        <tr th:each="t : ${dictationTopics}"
                            class="dictation-row border-b hover:bg-gray-50/50 transition"
                            th:data-category-id="${t.category != null ? t.category.id : ''}"
                            th:data-created-at="${t.created_at}">
                            <td class="p-4 text-gray-600 text-center" th:text="${t.id}">1</td>
                            <td class="p-4">
                                <span
                                    class="text-blue-500 cursor-pointer font-medium hover:underline flex items-center gap-2"
                                    th:onclick="'openDrawer(' + ${t.id} + ')'">
                                    <span th:text="${t.title}" class="dictation-name">Title</span>
                                </span>
                            </td>
                            <td class="p-4 text-gray-600"
                                th:text="${#temporals.format(t.created_at, 'dd/MM/yyyy HH:mm')}">Date</td>
                            <td class="p-4 text-gray-600"
                                th:text="${t.updated_at != null ? #temporals.format(t.updated_at, 'dd/MM/yyyy HH:mm') : '-'}">
                                Date</td>
                            <td class="p-4">
                                <div class="flex justify-center gap-2 items-center">
                                    <button th:onclick="'promptEditDictation(event, ' + ${t.id} + ')'"
                                        class="w-7 h-7 rounded border border-gray-200 flex justify-center items-center text-gray-500 hover:text-blue-500 hover:border-blue-200 transition bg-white"
                                        title="Edit"><i class="fa fa-pencil text-xs"></i></button>
                                    <button th:onclick="'promptDeleteDictation(event, ' + ${t.id} + ')'"
                                        class="w-7 h-7 rounded border border-red-200 flex justify-center items-center text-red-400 hover:bg-red-50 hover:text-red-500 transition bg-white"
                                        title="Delete"><i class="fa fa-trash-alt text-xs"></i></button>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(dictationTopics)}">
                            <td colspan="5" class="py-12 text-center text-gray-400">
                                <i class="fa fa-inbox text-4xl mb-3 block opacity-20"></i>
                                <span class="text-base font-medium">No dictations found</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Footer Pagination -->
            <div th:replace="~{admin/fragments/pagination :: pagination(${dictationTopics.size()})}"></div>

            <!-- Drawer -->
            <div th:replace="~{admin/dictation/drawer :: drawer}"></div>
        </div>
    </div>

    <!-- Modal Form -->
    <div th:replace="~{admin/dictation/modal :: modal}"></div>

    <!-- Template for JS rendering -->
    <template id="sentenceTemplate">
        <div
            class="sentence-block border border-gray-200 bg-white rounded-lg p-3 flex gap-3 items-start group shadow-sm">
            <div class="flex-1 space-y-3">
                <input type="text" name="sentenceTitles" required
                    class="w-full px-3 py-1.5 border border-gray-200 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm font-medium"
                    placeholder="Sentence text (required)">
                <div class="flex items-center gap-3 bg-gray-50 p-2 rounded border border-gray-100">
                    <span class="text-xs font-medium text-gray-600 whitespace-nowrap"><i
                            class="fa fa-file-audio-o mr-1 text-blue-400"></i> Audio File:</span>
                    <input type="file" name="sentenceAudios" accept="audio/*"
                        class="text-xs text-gray-500 file:mr-3 file:py-1 file:px-3 file:rounded file:border-0 file:bg-blue-50 file:text-blue-600 hover:file:bg-blue-100 w-full"
                        onchange="markModified(this)">
                    <input type="hidden" name="sentenceAudioUrls" value="">
                    <button type="button" onclick="playTTS(this)"
                        class="shrink-0 text-blue-500 hover:text-blue-700 bg-blue-50 p-1.5 rounded"
                        title="Text-to-Speech (AI Voice)">
                        <i class="fa fa-volume-up text-sm"></i>
                    </button>
                </div>
            </div>
            <button type="button" onclick="removeSentenceBlock(this)"
                class="text-red-400 hover:text-red-600 hover:bg-red-50 p-2 rounded transition" title="Remove sentence">
                <i class="fa fa-trash"></i>
            </button>
        </div>
    </template>

    <script th:src="@{/js/admin-common.js}"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        const dictationTopics = /*[[${dictationTopics}]]*/[];
        const rawCategories = /*[[${categories}]]*/[];
        let sentenceCount = 0;

        function dictationApp() { return {}; }

        let currentAudio = null;

        // Audio TTS
        function playTTS(btnEl) {
            const block = btnEl.closest('.sentence-block');
            const text = block.querySelector('input[name="sentenceTitles"]').value;
            if (!text) return;
            const url = block.querySelector('input[name="sentenceAudioUrls"]').value;
            const fileInput = block.querySelector('input[name="sentenceAudios"]');

            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            window.speechSynthesis.cancel();

            if (fileInput.files.length > 0) {
                currentAudio = new Audio(URL.createObjectURL(fileInput.files[0]));
                currentAudio.play();
            } else if (url && url.length > 5) {
                currentAudio = new Audio(url);
                currentAudio.play();
            } else {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US';
                window.speechSynthesis.speak(u);
            }
        }

        function playTopicAudio(url, text) {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            window.speechSynthesis.cancel();

            if (url && url.length > 5) { 
                currentAudio = new Audio(url);
                currentAudio.play(); 
            }
            else if (text) { 
                const u = new SpeechSynthesisUtterance(text); 
                u.lang = 'en-US'; 
                window.speechSynthesis.speak(u); 
            }
        }

        function markModified(input) {
            if (input.files.length > 0) {
                input.parentElement.querySelector('input[name="sentenceAudioUrls"]').value = '';
            }
        }

        function addSentenceBlock(title = '', audioUrl = '') {
            const template = document.getElementById('sentenceTemplate');
            const clone = template.content.cloneNode(true);
            const block = clone.querySelector('.sentence-block');
            block.querySelector('input[name="sentenceTitles"]').value = title;
            block.querySelector('input[name="sentenceAudioUrls"]').value = audioUrl;

            if (audioUrl) {
                block.querySelector('input[name="sentenceAudios"]').classList.add('hidden');
                const p = document.createElement('div');
                p.className = 'text-xs text-green-600 flex items-center gap-1 font-medium bg-green-50 px-2 py-1 rounded';
                p.innerHTML = `<i class="fa fa-check-circle"></i> Audio uploaded`;
                const btnRemove = document.createElement('button');
                btnRemove.type = 'button';
                btnRemove.className = 'ml-2 text-red-500 hover:underline';
                btnRemove.innerText = 'Change';
                btnRemove.onclick = () => {
                    block.querySelector('input[name="sentenceAudioUrls"]').value = '';
                    block.querySelector('input[name="sentenceAudios"]').classList.remove('hidden');
                    p.remove();
                };
                p.appendChild(btnRemove);
                block.querySelector('input[name="sentenceAudios"]').parentElement.prepend(p);
            }
            document.getElementById('sentenceContainer').appendChild(clone);
            sentenceCount++;
        }

        function removeSentenceBlock(btn) {
            if (sentenceCount <= 1) { alert("Minimum 1 sentence is required."); return; }
            btn.closest('.sentence-block').remove();
            sentenceCount--;
        }

        function filterDictation(categoryId) {
            currentCategoryFilter = categoryId;
            currentPage = 1;
            applyFilters();
        }

        function applyFilters() {
            const nameQuery = (document.getElementById('searchName').value || "").trim().toLowerCase();
            const fromQuery = document.getElementById('searchDateFrom') ? document.getElementById('searchDateFrom').value : "";
            const toQuery = document.getElementById('searchDateTo') ? document.getElementById('searchDateTo').value : "";

            const fromDateObj = fromQuery ? new Date(fromQuery) : null;
            if (fromDateObj) fromDateObj.setHours(0, 0, 0, 0);
            const toDateObj = toQuery ? new Date(toQuery) : null;
            if (toDateObj) toDateObj.setHours(23, 59, 59, 999);

            const validIds = currentCategoryFilter === null ? [] : getDescendantCategoryIds(currentCategoryFilter, rawCategories);
            const rows = Array.from(document.querySelectorAll('.dictation-row'));

            const matchedRows = rows.filter(row => {
                const rowCatIdStr = row.getAttribute('data-category-id');
                const catMatch = currentCategoryFilter === null || (rowCatIdStr && validIds.includes(parseInt(rowCatIdStr)));
                const nameEl = row.querySelector('.dictation-name');
                const rowName = nameEl ? nameEl.innerText.toLowerCase() : "";
                const nameMatch = nameQuery === "" || rowName.includes(nameQuery);
                const dateStr = row.getAttribute('data-created-at');
                let dateMatch = true;
                if (dateStr && (fromDateObj || toDateObj)) {
                    const rowDate = new Date(dateStr);
                    if (fromDateObj && rowDate < fromDateObj) dateMatch = false;
                    if (toDateObj && rowDate > toDateObj) dateMatch = false;
                }
                return catMatch && nameMatch && dateMatch;
            });

            rows.forEach(row => row.style.display = 'none');
            const { startIndex, endIndex } = updatePaginationUI(matchedRows.length);
            matchedRows.slice(startIndex, endIndex).forEach(row => row.style.display = '');
        }

        // Drawer
        async function openDrawer(id) {
            const topic = dictationTopics.find(v => v.id === id);
            if (!topic) return;
            const content = document.getElementById('drawerContent');
            const catName = topic.category ? topic.category.name : '';

            const res = await fetch(`/admin/api/dictation/${id}/sentences`);
            let sentencesHTML = `<p class="text-gray-500 text-sm">No sentences found.</p>`;
            if (res.ok) {
                const sents = await res.json();
                if (sents.length > 0) {
                    sentencesHTML = sents.map((s, idx) => `
                        <div class="flex items-center gap-3 p-3 bg-gray-50 border border-gray-100 rounded mb-2 shadow-sm">
                            <span class="font-bold text-blue-400 w-6">${idx + 1}.</span>
                            <span class="flex-1 text-gray-800 text-sm font-medium">${s.title}</span>
                            <button onclick="playTopicAudio('${s.audioUrl || ''}', '${s.title.replace(/'/g, "\\'")}')" class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 hover:bg-blue-600 hover:text-white transition flex items-center justify-center shrink-0">
                                <i class="fa fa-volume-up text-sm"></i>
                            </button>
                        </div>
                    `).join('');
                }
            }
            content.innerHTML = `
                <div><h2 class="text-2xl font-bold text-gray-900 mb-2">${topic.title}</h2>
                    <span class="px-2 py-1 text-blue-600 bg-blue-50 border border-blue-100 rounded text-xs">${catName}</span></div>
                <div><h4 class="font-bold text-gray-900 mb-2 text-base">Description</h4>
                    <p class="text-gray-700 text-sm whitespace-pre-wrap">${topic.description || 'No description provided.'}</p></div>
                <div><h4 class="font-bold text-gray-900 mb-3 text-base flex items-center gap-2"><i class="fa fa-list"></i> Sentences</h4>
                    ${sentencesHTML}</div>
            `;
            document.getElementById('dictationDrawer').classList.remove('translate-x-full');
        }

        function closeDrawer() {
            document.getElementById('dictationDrawer').classList.add('translate-x-full');
        }

        function openAddModal() {
            document.getElementById('addForm').reset();
            document.getElementById('topicIdInput').value = '';
            document.getElementById('modalTitle').innerText = 'Add Dictation Topic';
            document.getElementById('sentenceContainer').innerHTML = '';
            sentenceCount = 0;
            addSentenceBlock();
            toggleModal(true);
        }

        function closeAddModal() { toggleModal(false); }

        async function promptEditDictation(event, id) {
            event.stopPropagation();
            const topic = dictationTopics.find(v => v.id === id);
            if (!topic) return;
            document.getElementById('topicIdInput').value = topic.id;
            const form = document.getElementById('addForm');
            form.title.value = topic.title;
            form.description.value = topic.description;
            if (topic.category) form.categoryId.value = topic.category.id;
            document.getElementById('modalTitle').innerText = 'Edit Dictation Topic';
            document.getElementById('sentenceContainer').innerHTML = '';
            sentenceCount = 0;
            try {
                const res = await fetch(`/admin/api/dictation/${id}/sentences`);
                if (res.ok) { const sents = await res.json(); sents.forEach(s => addSentenceBlock(s.title, s.audioUrl)); }
            } catch (e) { }
            if (sentenceCount === 0) addSentenceBlock();
            toggleModal(true);
        }

        async function submitForm(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const blocks = document.querySelectorAll('.sentence-block');
            if (blocks.length === 0) { alert("Please add at least 1 sentence"); return; }
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Saving...';
            btn.disabled = true;
            const form = document.getElementById('addForm');
            const formData = new FormData();
            if (form.id.value) formData.append('id', form.id.value);
            formData.append('title', form.title.value);
            formData.append('description', form.description.value);
            formData.append('categoryId', form.categoryId.value);
            blocks.forEach((b) => {
                formData.append('sentences', b.querySelector('input[name="sentenceTitles"]').value);
                formData.append('audioUrls', b.querySelector('input[name="sentenceAudioUrls"]').value || '');
                const audioFile = b.querySelector('input[name="sentenceAudios"]').files[0];
                formData.append('audios', audioFile ? audioFile : new Blob());
            });
            try {
                const response = await fetch('/admin/api/dictation', { method: 'POST', body: formData });
                if (response.ok) { window.location.reload(); }
                else { alert('Failed to save Topic.'); btn.disabled = false; btn.innerHTML = originalText; }
            } catch (error) { alert('Network error occurred.'); btn.disabled = false; btn.innerHTML = originalText; }
        }

        async function promptDeleteDictation(event, id) {
            event.stopPropagation();
            if (!confirm("Are you sure you want to delete this topic and all its sentences?")) return;
            try {
                const res = await fetch(`/admin/api/dictation/${id}`, { method: 'DELETE' });
                if (res.ok) window.location.reload();
                else alert("Failed to delete.");
            } catch (e) { alert("Network error."); }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await initCategoryTree(rawCategories, 'dictation', filterDictation);
            applyFilters();
        });
        /*]]>*/
    </script>
</div>

</html>
