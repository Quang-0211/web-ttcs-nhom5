<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div th:fragment="content" class="flex-1 p-6 overflow-y-auto bg-gray-50">

        <div class="bg-white p-6 rounded-xl shadow-sm mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Title:</label>
                    <input type="text" placeholder="Search article title..."
                        class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Category:</label>
                    <select
                        class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-blue-500 focus:border-blue-500 outline-none bg-white text-sm">
                        <option value="">All Categories</option>
                        <option value="NEWS">News</option>
                        <option value="TECH">Technology</option>
                        <option value="LIFE">Lifestyle</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Status:</label>
                    <select
                        class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-blue-500 focus:border-blue-500 outline-none bg-white text-sm">
                        <option value="">Please select</option>
                        <option value="true">Active</option>
                        <option value="false">Disabled</option>
                    </select>
                </div>
                <div class="flex items-end gap-3">
                    <button
                        class="flex-1 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 flex items-center justify-center gap-2 text-sm font-medium">
                        Query <i class="fa fa-search text-xs"></i>
                    </button>
                    <button
                        class="px-4 py-2 border border-gray-300 rounded-md hover:bg-gray-50 text-gray-700 text-sm">Reset</button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100">
            <div class="p-4 border-b flex justify-between items-center">
                <h3 class="font-bold text-gray-800">Article List</h3>
                <div class="flex gap-2">
                    <button
                        class="px-3 py-1.5 border rounded-md text-sm flex items-center gap-2 hover:bg-gray-50 text-gray-600">
                        <i class="fa fa-download"></i> Export
                    </button>
                    <button onclick="openArticleModal('create')"
                        class="px-3 py-1.5 bg-blue-600 text-white rounded-md text-sm flex items-center gap-2 hover:bg-blue-700 transition-all">
                        <i class="fa fa-plus"></i> Create
                    </button>
                    <div class="flex items-center gap-3 ml-2 border-l pl-3 text-gray-400">
                        <i class="fa fa-redo cursor-pointer hover:text-blue-500"></i>
                        <i class="fa fa-columns cursor-pointer hover:text-blue-500"></i>
                        <i class="fa fa-cog cursor-pointer hover:text-blue-500"></i>
                    </div>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 text-gray-600 text-xs uppercase tracking-wider">
                        <tr>
                            <th class="p-4 font-semibold border-b">ID</th>
                            <th class="p-4 font-semibold border-b">Thumbnail</th>
                            <th class="p-4 font-semibold border-b">Article Title</th>
                            <th class="p-4 font-semibold border-b">Category</th>
                            <th class="p-4 font-semibold border-b text-center">Status</th>
                            <th class="p-4 font-semibold border-b">Created At</th>
                            <th class="p-4 font-semibold border-b text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody class="text-gray-700 text-sm">
                        <tr class="border-b hover:bg-gray-50 transition-colors">
                            <td class="p-4">1</td>
                            <td class="p-4">
                                <img src="https://via.placeholder.com/60x40"
                                    class="rounded border object-cover shadow-sm" alt="thumb">
                            </td>
                            <td class="p-4">
                                <a href="#" class="text-blue-600 font-medium hover:underline">Building the City of the
                                    Future</a>
                            </td>
                            <td class="p-4">
                                <span
                                    class="px-2 py-1 bg-purple-100 text-purple-600 text-xs rounded border border-purple-200 font-medium">TECHNOLOGY</span>
                            </td>
                            <td class="p-4 text-center">
                                <div class="relative inline-block w-10 align-middle select-none">
                                    <input type="checkbox" checked
                                        class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer right-0 border-blue-600" />
                                    <label
                                        class="toggle-label block overflow-hidden h-5 rounded-full bg-blue-600 cursor-pointer"></label>
                                </div>
                            </td>
                            <td class="p-4 text-gray-500">15:15:48 08/11/2025</td>
                            <td class="p-4 text-center">
                                <div class="flex justify-center gap-2">
                                    <button onclick="openArticleModal('update', 1)"
                                        class="p-2 text-gray-400 hover:text-blue-500 transition-colors">
                                        <i class="fa fa-edit text-lg"></i>
                                    </button>
                                    <button onclick="openArticleModal('create')"
                                        class="p-2 text-gray-400 hover:text-red-500 transition-colors">
                                        <i class="fa fa-trash text-lg"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="p-4 border-t flex justify-end items-center gap-4 text-sm text-gray-600 bg-gray-50/50">
                <span>1-10 of 11 items</span>
                <div class="flex items-center gap-2">
                    <button class="p-1 px-2 border rounded hover:bg-white disabled:opacity-50" disabled>&lt;</button>
                    <button
                        class="w-8 h-8 flex items-center justify-center border rounded bg-blue-600 text-white shadow-sm">1</button>
                    <button
                        class="w-8 h-8 flex items-center justify-center border rounded hover:bg-white transition-colors">2</button>
                    <button class="p-1 px-2 border rounded hover:bg-white">&gt;</button>
                </div>
                <select class="border rounded px-2 py-1 outline-none bg-white">
                    <option>10 / page</option>
                    <option>20 / page</option>
                </select>
            </div>
        </div>

        <style>
            .toggle-checkbox:checked {
                right: 0;
                border-color: #2563eb;
            }

            .toggle-checkbox:checked+.toggle-label {
                background-color: #2563eb;
            }

            .toggle-checkbox {
                right: 1.25rem;
                transition: all 0.2s ease-in-out;
            }

            .toggle-label {
                transition: all 0.2s ease-in-out;
            }
        </style>
        <!-- Article Modal -->
        <div id="articleModal"
            class="fixed inset-0 bg-gray-900 bg-opacity-60 z-50 hidden flex items-center justify-center transition-all duration-300 opacity-0 pointer-events-none">

            <div
                class="bg-white rounded-xl shadow-xl w-[70%] max-w-[900px] overflow-hidden transform scale-95 transition-transform duration-300">

                <div class="p-5 border-b flex justify-between items-center">
                    <h3 id="modalTitle" class="text-xl font-semibold text-gray-800">Add a new Article</h3>
                    <button onclick="closeArticleModal()" class="text-gray-400 hover:text-red-500 transition-colors">
                        <i class="fa fa-times text-xl"></i>
                    </button>
                </div>

                <div class="p-6 space-y-5 max-h-[70vh] overflow-y-auto">

                    <div>
                        <label for="articleTitle" class="block text-sm font-medium text-gray-700 mb-1.5">
                            <span class="text-red-500">*</span> Article Title
                        </label>
                        <input type="text" id="articleTitle" placeholder="Building the City of the Future"
                            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Thumbnail Image</label>
                        <div
                            class="border-2 border-dashed border-gray-300 rounded-lg p-2 w-48 h-28 flex items-center justify-center bg-gray-50">
                            <img id="thumbnailPreview" src="https://via.placeholder.com/150" alt="Preview"
                                class="max-w-full max-h-full rounded">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Audio File</label>
                        <div class="flex items-center gap-3">
                            <button
                                class="px-4 py-2 border border-gray-300 rounded-lg text-sm flex items-center gap-2 hover:bg-gray-50">
                                <i class="fa fa-upload text-blue-500"></i> Click to Upload
                            </button>
                            <span id="audioFileName" class="text-sm text-gray-500">lion.mp3</span>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">
                            <span class="text-red-500">*</span> Content
                        </label>

                        <div
                            class="border border-gray-300 rounded-t-lg bg-gray-50 p-2 flex items-center gap-1 flex-wrap text-gray-600">
                            <button class="p-1.5 rounded hover:bg-gray-200"><i class="fa fa-bold"></i></button>
                            <button class="p-1.5 rounded hover:bg-gray-200"><i class="fa fa-italic"></i></button>
                            <button class="p-1.5 rounded hover:bg-gray-200"><i class="fa fa-underline"></i></button>
                            <button class="p-1.5 rounded hover:bg-gray-200"><i class="fa fa-strikethrough"></i></button>
                            <div class="h-5 w-px bg-gray-300 mx-1"></div>
                            <button class="p-1.5 rounded hover:bg-gray-200"><i
                                    class="fa fa-highlighter text-blue-500"></i></button>
                            <div class="h-5 w-px bg-gray-300 mx-1"></div>
                            <button class="p-1.5 rounded hover:bg-gray-200"><i class="fa fa-align-left"></i></button>
                            <button class="p-1.5 rounded hover:bg-gray-200"><i class="fa fa-align-center"></i></button>
                            <button class="p-1.5 rounded hover:bg-gray-200"><i class="fa fa-align-right"></i></button>
                            <div class="h-5 w-px bg-gray-300 mx-1"></div>
                            <button class="p-1.5 rounded hover:bg-gray-200 font-medium">H1</button>
                            <button class="p-1.5 rounded hover:bg-gray-200 font-medium">H2</button>
                            <button class="p-1.5 rounded hover:bg-gray-200 font-medium">H3</button>
                            <div class="h-5 w-px bg-gray-300 mx-1"></div>
                            <button class="p-1.5 rounded hover:bg-gray-200"><i class="fa fa-list-ul"></i></button>
                            <button class="p-1.5 rounded hover:bg-gray-200"><i class="fa fa-list-ol"></i></button>
                            <button class="p-1.5 rounded hover:bg-gray-200"><i class="fa fa-link"></i></button>
                            <button class="p-1.5 rounded hover:bg-gray-200"><i class="fa fa-image"></i></button>
                        </div>

                        <div class="border border-t-0 border-gray-300 rounded-b-lg p-4 bg-white min-h-[200px]">
                            <div id="contentEditor" contenteditable="true" class="focus:outline-none">
                                Thành phố tương lai<br><br>Các nhà khoa học đang nghiên cứu...
                            </div>
                        </div>
                    </div>
                </div>

                <div class="p-5 border-t bg-gray-50 flex justify-end gap-3">
                    <button onclick="closeArticleModal()"
                        class="px-5 py-2 border border-gray-300 rounded-lg text-sm hover:bg-white text-gray-700">Cancel</button>
                    <button class="px-6 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">OK</button>
                </div>
            </div>

        </div>

        <script th:src="@{/js/adminarticle.js}"></script>
    </div>
</body>

</html>
