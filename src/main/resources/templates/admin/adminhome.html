<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Admin Page</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-gray-100">

    <div class="flex h-screen w-full overflow-hidden bg-gray-100">

        <div class="w-64 shrink-0 bg-white shadow-lg p-4 flex flex-col overflow-y-auto z-20">

            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">ADMIN PAGE</h2>

            <ul class="space-y-2 text-gray-700">
                <li>
                    <a th:href="@{/admin/dashboard}"
                        th:classappend="${path == 'admin/dashboard'} ? 'bg-blue-100 text-blue-600 font-semibold' : 'hover:bg-gray-100'"
                        class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 hover:text-blue-500 ">
                        <i class="fa fa-chart-line"></i> Dashboard
                    </a>
                </li>

                <li>
                    <a th:href="@{/admin/users}"
                        th:classappend="${path.startsWith('admin/user')} ? 'bg-blue-100 text-blue-600 font-semibold' : 'hover:bg-gray-100'"
                        class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 hover:text-blue-500">
                        <i class="fa fa-user"></i> User
                    </a>
                </li>

                <li>
                    <a th:href="@{/admin/plan}"
                        th:classappend="${path.startsWith('admin/plan')} ? 'bg-blue-100 text-blue-600 font-semibold' : 'hover:bg-gray-100'"
                        class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 hover:text-blue-500">
                        <i class="fa fa-box"></i> Plan
                    </a>
                </li>

                <li>
                    <a th:href="@{/admin/subscription}"
                        th:classappend="${path.startsWith('admin/subscription')} ? 'bg-blue-100 text-blue-600 font-semibold' : 'hover:bg-gray-100'"
                        class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 hover:text-blue-500">
                        <i class="fa fa-credit-card"></i> Subscription
                    </a>
                </li>

                <li>
                    <a th:href="@{/admin/statistic}"
                        th:classappend="${path.startsWith('admin/statistic')} ? 'bg-blue-100 text-blue-600 font-semibold' : 'hover:bg-gray-100'"
                        class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 hover:text-blue-500">
                        <i class="fa fa-chart-bar"></i> Statistic
                    </a>
                </li>

                <li>
                    <a th:href="@{/admin/articles}"
                        th:classappend="${path.startsWith('admin/article')} ? 'bg-blue-100 text-blue-600 font-semibold' : 'hover:bg-gray-100'"
                        class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 hover:text-blue-500">
                        <i class="fa fa-file"></i> Article
                    </a>
                </li>

                <li>
                    <a th:href="@{/admin/courses}"
                        th:classappend="${path.startsWith('admin/course')} ? 'bg-blue-100 text-blue-600 font-semibold' : 'hover:bg-gray-100'"
                        class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 hover:text-blue-500">
                        <i class="fa fa-graduation-cap"></i> Course
                    </a>
                </li>

                <li>
                    <a th:href="@{/admin/videos}"
                        th:classappend="${path.startsWith('admin/video')} ? 'bg-blue-100 text-blue-600 font-semibold' : 'hover:bg-gray-100'"
                        class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 hover:text-blue-500">
                        <i class="fa fa-video"></i> Video
                    </a>
                </li>

                <li>
                    <a th:href="@{/admin/grammar}"
                        th:classappend="${path.startsWith('admin/grammar')} ? 'bg-blue-100 text-blue-600 font-semibold' : 'hover:bg-gray-100'"
                        class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 hover:text-blue-500">
                        <i class="fa fa-book"></i> Grammar
                    </a>
                </li>

                <li>
                    <a th:href="@{/admin/vocabulary}"
                        th:classappend="${path.startsWith('admin/vocabulary')} ? 'bg-blue-100 text-blue-600 font-semibold' : 'hover:bg-gray-100'"
                        class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 hover:text-blue-500">
                        <i class="fa fa-language"></i> Vocabulary
                    </a>
                </li>

                <li>
                    <a th:href="@{/admin/quiz}"
                        th:classappend="${path.startsWith('admin/quiz')} ? 'bg-blue-100 text-blue-600 font-semibold' : 'hover:bg-gray-100'"
                        class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 hover:text-blue-500">
                        <i class="fa fa-question-circle"></i> Quiz
                    </a>
                </li>

                <li>
                    <a th:href="@{/admin/dictation}"
                        th:classappend="${path.startsWith('admin/dictation')} ? 'bg-blue-100 text-blue-600 font-semibold' : 'hover:bg-gray-100'"
                        class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 hover:text-blue-500">
                        <i class="fa fa-microphone"></i> Dictation
                    </a>
                </li>
            </ul>

            <div class="mt-auto pt-4 border-t border-gray-200">
                <form th:action="@{/logout}" method="get">
                    <button type="submit"
                        class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-red-500 hover:bg-red-50 transition-colors">
                        <i class="fa fa-sign-out-alt"></i>
                        <span class="font-medium">Logout</span>
                    </button>
                </form>
            </div>

        </div>

        <div th:replace="~{${path} :: content}" class="flex-1 min-h-0 min-w-0 overflow-y-auto"></div>
    </div>

    <script th:src="@{/js/adminarticle.js}"></script>
</body>

</html>
