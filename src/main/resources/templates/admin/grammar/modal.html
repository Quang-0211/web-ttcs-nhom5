<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="modal">
    <div id="addModal"
        class="fixed inset-0 bg-gray-900 bg-opacity-40 backdrop-blur-sm z-50 flex justify-center items-center hidden transition-opacity duration-300 opacity-0">
        <div class="bg-white rounded-lg shadow-2xl w-2/3 max-w-3xl max-h-[90vh] flex flex-col overflow-hidden transform scale-95 transition-all duration-300"
            id="modalDialog">
            <div class="p-5 border-b flex justify-between items-center bg-gray-50/50">
                <h3 id="modalTitle" class="font-bold text-lg text-gray-800">Add New Grammar</h3>
                <button onclick="closeAddModal()"
                    class="text-gray-400 hover:text-gray-800 w-8 h-8 rounded-full hover:bg-gray-100"><i
                        class="fa fa-times text-lg"></i></button>
            </div>
            <div class="p-6 overflow-y-auto flex-1">
                <form id="addForm" class="flex flex-col gap-6" onsubmit="submitForm(event)">
                    <input type="hidden" name="id" id="grammarIdInput">

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Grammar Name <span
                                    class="text-red-500">*</span></label>
                            <input type="text" name="name" required
                                class="w-full border border-gray-300 rounded p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm transition">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Category <span
                                    class="text-red-500">*</span></label>
                            <select name="categoryId" required
                                class="w-full border border-gray-300 bg-white rounded p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm transition"></select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Content <span
                                class="text-red-500">*</span></label>
                        <textarea name="content" required rows="10"
                            class="w-full border border-gray-300 rounded p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm transition"
                            placeholder="Enter grammar rules, formulas, examples..."></textarea>
                    </div>

                    <div class="flex justify-end gap-3 pt-4 border-t">
                        <button type="button" onclick="closeAddModal()"
                            class="px-5 py-2.5 text-gray-600 bg-white border border-gray-300 rounded hover:bg-gray-50 text-sm font-medium">Cancel</button>
                        <button type="submit" id="submitBtn"
                            class="px-5 py-2.5 text-white bg-blue-500 rounded hover:bg-blue-600 text-sm font-medium shadow-sm">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</html>
