<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="content" class="flex-1 min-h-0 min-w-0 w-full h-full flex flex-col bg-gray-50/50 overflow-y-auto"
    x-data="grammarApp()">

    <div class="bg-white px-6 pt-3 border-b shrink-0 flex items-end">
        <div class="flex gap-6 relative -mb-[1px]">
            <button
                class="px-4 py-2 text-blue-600 border-b-2 border-blue-600 font-medium text-sm tracking-wide transition-colors">Grammar
                List</button>
            <button
                class="px-4 py-2 border-b-2 border-transparent text-gray-500 hover:text-gray-800 hover:border-gray-300 font-medium text-sm tracking-wide transition-colors">Quiz
                List</button>
        </div>
    </div>

    <div class="flex flex-1 overflow-hidden m-6 gap-6 min-h-0 min-w-0">

        <div th:replace="~{admin/grammar/sidebar :: sidebar}"></div>

        <div
            class="flex-1 bg-white rounded shadow-sm flex flex-col border border-gray-100 overflow-hidden relative min-w-0 min-h-0">

            <div class="p-4 border-b bg-white flex flex-wrap items-center gap-6 text-sm">
                <div class="flex items-center gap-2">
                    <span class="text-gray-600">Name:</span>
                    <input type="text" id="searchName" placeholder="Search grammar name..."
                        class="border rounded px-3 py-1.5 w-64 focus:ring-1 focus:ring-blue-500 outline-none text-gray-800"
                        onkeyup="if(event.key === 'Enter') { currentPage = 1; applyFilters(); }">
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-gray-600">Created at:</span>
                    <div class="flex items-center border rounded bg-white text-gray-600 overflow-hidden">
                        <input type="text" id="searchDateFrom" placeholder="From" onfocus="(this.type='date')"
                            onblur="if(!this.value) this.type='text'"
                            class="px-2 py-1.5 w-[130px] outline-none border-none bg-transparent text-sm">
                        <i class="fa fa-arrow-right mx-2 text-xs text-gray-400"></i>
                        <input type="text" id="searchDateTo" placeholder="To" onfocus="(this.type='date')"
                            onblur="if(!this.value) this.type='text'"
                            class="px-2 py-1.5 w-[130px] outline-none border-none bg-transparent text-sm">
                    </div>
                </div>
                <div class="ml-auto flex gap-3">
                    <button onclick="currentPage = 1; applyFilters()"
                        class="px-4 py-1.5 bg-blue-500 text-white rounded font-medium shadow-sm hover:bg-blue-600 transition">Query</button>
                </div>
            </div>

            <div class="p-4 flex justify-between items-center bg-white border-b border-gray-50">
                <h3 class="font-bold text-gray-800">Grammar Management</h3>
                <div class="flex items-center gap-3">
                    <button onclick="openAddModal()"
                        class="bg-blue-500 text-white px-4 py-1.5 rounded flex items-center gap-1.5 text-sm font-medium hover:bg-blue-600 transition shadow-sm">
                        <i class="fa fa-plus"></i> Create
                    </button>
                    <button
                        class="w-8 h-8 rounded-full hover:bg-gray-100 text-gray-600 flex items-center justify-center transition"
                        onclick="window.location.reload()" title="Refresh"><i class="fa fa-redo text-sm"></i></button>
                </div>
            </div>

            <div class="flex-1 overflow-auto">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-gray-50 border-b border-t text-gray-700 sticky top-0 z-10">
                        <tr>
                            <th class="px-4 py-3 font-medium w-12 text-center">ID</th>
                            <th class="px-4 py-3 font-medium text-left">Grammar Name</th>
                            <th class="px-4 py-3 font-medium text-left">Created At</th>
                            <th class="px-4 py-3 font-medium text-left">Updated At</th>
                            <th class="px-4 py-3 font-medium text-center w-24">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="g : ${grammars}" class="grammar-row border-b hover:bg-gray-50/50 transition"
                            th:data-category-id="${g.category != null ? g.category.id : ''}"
                            th:data-created-at="${g.created_at}">
                            <td class="p-4 text-gray-600 text-center" th:text="${g.id}">1</td>
                            <td class="p-4">
                                <span
                                    class="text-blue-500 cursor-pointer font-medium hover:underline flex items-center gap-2"
                                    th:onclick="'openDrawer(' + ${g.id} + ')'">
                                    <span th:text="${g.name}" class="grammar-name">Present Tense</span>
                                </span>
                            </td>
                            <td class="p-4 text-gray-600"
                                th:text="${#temporals.format(g.created_at, 'dd/MM/yyyy HH:mm')}">Date</td>
                            <td class="p-4 text-gray-600"
                                th:text="${g.updated_at != null ? #temporals.format(g.updated_at, 'dd/MM/yyyy HH:mm') : '-'}">
                                Date</td>
                            <td class="p-4">
                                <div class="flex justify-center gap-2 items-center">
                                    <button th:onclick="'promptEditGrammar(event, ' + ${g.id} + ')'"
                                        class="w-7 h-7 rounded border border-gray-200 flex justify-center items-center text-gray-500 hover:text-blue-500 hover:border-blue-200 transition bg-white"><i
                                            class="fa fa-pencil text-xs"></i></button>
                                    <button th:onclick="'deleteGrammar(event, ' + ${g.id} + ')'"
                                        class="w-7 h-7 rounded border border-red-200 flex justify-center items-center text-red-400 hover:bg-red-50 hover:text-red-500 transition bg-white"><i
                                            class="fa fa-trash-alt text-xs"></i></button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div th:replace="~{admin/fragments/pagination :: pagination(${grammars.size()})}"></div>

            <div th:replace="~{admin/grammar/drawer :: drawer}"></div>
        </div>
    </div>

    <div th:replace="~{admin/grammar/modal :: modal}"></div>

    <script th:src="@{/js/admin-common.js}"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        const grammars = /*[[${grammars}]]*/[];
        const rawCategories = /*[[${categories}]]*/[];

        function grammarApp() { return {}; }

        async function deleteGrammar(event, id) {
            event.stopPropagation();
            if (!confirm("Are you sure you want to delete this grammar?")) return;
            try {
                const response = await fetch('/admin/api/grammar/' + id, { method: 'DELETE' });
                if (response.ok) window.location.reload();
                else alert("Failed to delete.");
            } catch (e) { alert("Network error."); }
        }

        function openDrawer(id) {
            const grammar = grammars.find(g => g.id === id);
            if (!grammar) return;
            const content = document.getElementById('drawerContent');
            const catName = grammar.category ? grammar.category.name : '';
            content.innerHTML = `
                <div class="mb-6">
                    <span class="px-2 py-1 bg-blue-50 text-blue-600 rounded text-xs font-bold uppercase tracking-wider">${catName}</span>
                    <h2 class="text-3xl font-bold text-gray-900 mt-3">${grammar.name}</h2>
                </div>
                <div class="prose prose-sm max-w-none text-gray-700 bg-gray-50 p-6 rounded-lg border border-gray-200 whitespace-pre-wrap leading-relaxed">
                    ${grammar.content}
                </div>
            `;
            document.getElementById('grammarDrawer').classList.remove('translate-x-full');
        }

        function closeDrawer() {
            document.getElementById('grammarDrawer').classList.add('translate-x-full');
        }

        function openAddModal() {
            document.getElementById('addForm').reset();
            document.getElementById('grammarIdInput').value = '';
            document.getElementById('modalTitle').innerText = 'Add New Grammar';
            toggleModal(true);
        }

        function promptEditGrammar(event, id) {
            event.stopPropagation();
            const grammar = grammars.find(g => g.id === id);
            if (!grammar) return;
            document.getElementById('grammarIdInput').value = grammar.id;
            const form = document.getElementById('addForm');
            form.name.value = grammar.name;
            form.content.value = grammar.content;
            if (grammar.category) form.categoryId.value = grammar.category.id;
            document.getElementById('modalTitle').innerText = 'Edit Grammar';
            toggleModal(true);
        }

        function closeAddModal() { toggleModal(false); }

        async function submitForm(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Saving...';
            btn.disabled = true;
            try {
                const response = await fetch('/admin/api/grammar', {
                    method: 'POST',
                    body: new FormData(e.target)
                });
                if (response.ok) window.location.reload();
                else alert("Failed to save.");
            } catch (err) {
                alert("Network error.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function filterGrammar(categoryId) {
            currentCategoryFilter = categoryId;
            currentPage = 1;
            applyFilters();
        }

        function applyFilters() {
            const nameQuery = (document.getElementById('searchName').value || "").trim().toLowerCase();
            const fromQuery = document.getElementById('searchDateFrom') ? document.getElementById('searchDateFrom').value : "";
            const toQuery = document.getElementById('searchDateTo') ? document.getElementById('searchDateTo').value : "";

            const fromDateObj = fromQuery ? new Date(fromQuery) : null;
            if (fromDateObj) fromDateObj.setHours(0, 0, 0, 0);
            const toDateObj = toQuery ? new Date(toQuery) : null;
            if (toDateObj) toDateObj.setHours(23, 59, 59, 999);

            const validIds = currentCategoryFilter === null ? [] : getDescendantCategoryIds(currentCategoryFilter, rawCategories);
            const rows = Array.from(document.querySelectorAll('.grammar-row'));

            const matchedRows = rows.filter(row => {
                const rowCatIdStr = row.getAttribute('data-category-id');
                const catMatch = currentCategoryFilter === null || (rowCatIdStr && validIds.includes(parseInt(rowCatIdStr)));
                const nameEl = row.querySelector('.grammar-name');
                const rowName = nameEl ? nameEl.innerText.toLowerCase() : "";
                const nameMatch = nameQuery === "" || rowName.includes(nameQuery);
                const dateStr = row.getAttribute('data-created-at');
                let dateMatch = true;
                if (dateStr && (fromDateObj || toDateObj)) {
                    const rowDate = new Date(dateStr);
                    if (fromDateObj && rowDate < fromDateObj) dateMatch = false;
                    if (toDateObj && rowDate > toDateObj) dateMatch = false;
                }
                return catMatch && nameMatch && dateMatch;
            });

            rows.forEach(row => row.style.display = 'none');
            const { startIndex, endIndex } = updatePaginationUI(matchedRows.length);
            matchedRows.slice(startIndex, endIndex).forEach(row => row.style.display = '');
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await initCategoryTree(rawCategories, 'grammar', filterGrammar);
            applyFilters();
        });
        /*]]>*/
    </script>
</div>

</html>
