<!DOCTYPE html>
<html th:fragment="content" xmlns:th="http://www.thymeleaf.org">

<head>
    <!-- Đảm bảo bạn đã có các link thư viện này ở file layout hoặc thêm vào đây -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<div class="flex-1 min-h-0 min-w-0 overflow-y-auto p-6 flex flex-col gap-6">
    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8 flex-1 flex flex-col">
        <h1 class="text-2xl font-extrabold text-gray-800 mb-8">Edit Quiz</h1>

        <!-- Dữ liệu được quản lý bởi Alpine.js thông qua quizEditor() -->
        <div x-data="quizEditor()" class="flex flex-col gap-8">

            <!-- Quiz Details Section -->
            <div class="border-b border-gray-200 pb-8">
                <h2 class="text-lg font-extrabold text-gray-700 mb-4">Quiz Information</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Title *</label>
                        <input x-model="quiz.title" type="text"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                            required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Category</label>
                        <select x-model="quiz.categoryId"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                            <option value="">Select Category</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                        </select>
                    </div>
                </div>
                <div class="mt-6">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Description</label>
                    <textarea x-model="quiz.description" rows="3"
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500"></textarea>
                </div>
            </div>

            <!-- Questions Section -->
            <div class="border-b border-gray-200 pb-8">


                <!-- Danh sách câu hỏi render bởi Alpine.js -->
                <template x-for="(question, qIndex) in quiz.questions" :key="qIndex">
                    <div class="bg-gray-50 p-6 rounded-xl mb-6 border border-gray-200">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="font-bold text-gray-700">Question <span x-text="qIndex + 1"></span></h3>
                            <button type="button" @click="removeQuestion(qIndex)"
                                class="text-red-500 hover:text-red-700 transition-colors">
                                <i class="fa fa-trash"></i>
                            </button>
                        </div>

                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-2">Question Text *</label>
                                <textarea x-model="question.content" rows="2"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                                    required></textarea>
                            </div>

                            <!-- Answers -->
                            <div>
                                <div class="flex justify-between items-center mb-3">
                                    <label class="block text-sm font-bold text-gray-700">Answers</label>
                                    <button type="button" @click="addAnswer(qIndex)"
                                        class="px-3 py-1 bg-blue-500 text-white text-sm font-bold rounded-lg hover:bg-blue-600 transition-colors">
                                        <i class="fa fa-plus mr-1"></i>Add Answer
                                    </button>
                                </div>

                                <template x-for="(answer, aIndex) in question.answers" :key="aIndex">
                                    <div
                                        class="flex gap-3 mb-3 p-4 bg-white rounded-lg border border-gray-300 shadow-sm">
                                        <div class="flex-1">
                                            <input x-model="answer.content" type="text" placeholder="Answer text"
                                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:border-blue-500 outline-none"
                                                required>
                                        </div>
                                        <div class="flex items-center gap-2">
                                            <label class="flex items-center gap-2 cursor-pointer group">
                                                <input type="checkbox" x-model="answer.isCorrect"
                                                    class="w-5 h-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                                                <span
                                                    class="text-sm font-medium text-gray-600 group-hover:text-blue-600">Correct</span>
                                            </label>
                                        </div>
                                        <button type="button" @click="removeAnswer(qIndex, aIndex)"
                                            class="px-3 py-2 text-red-500 hover:text-red-700 hover:bg-red-50 rounded-lg transition-colors">
                                            <i class="fa fa-trash"></i>
                                        </button>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-extrabold text-gray-700">Questions</h2>
                    <button type="button" @click="addQuestion()"
                        class="px-4 py-2 bg-green-500 text-white font-bold rounded-lg hover:bg-green-600 transition-colors">
                        <i class="fa fa-plus mr-2"></i>Add Question
                    </button>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex justify-end gap-3">
                <a href="/admin/quiz"
                    class="px-6 py-3 border border-gray-300 text-gray-700 font-bold rounded-xl hover:bg-gray-50 transition-colors">Cancel</a>
                <button type="button" @click="saveFullQuiz()"
                    class="px-6 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all active:scale-95">
                    <i class="fa fa-save mr-2"></i>Save Changes
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script th:inline="javascript">
    function quizEditor() {
        return {
            // Lấy dữ liệu trực tiếp từ Model của Spring Boot truyền xuống
            // Cú pháp /*[[...]]*/ giúp gán dữ liệu an toàn vào JavaScript
            quiz: {
                id: /*[[${quiz.id}]]*/ null,
                title: /*[[${quiz.title}]]*/ '',
                description: /*[[${quiz.description}]]*/ '',
                categoryId: /*[[${quiz.category != null ? quiz.category.id : ''}]]*/ '',
                // Toàn bộ danh sách questions kèm answers đã được Spring render sẵn vào đây
                questions: /*[[${questions}]]*/[]
            },

            addQuestion() {
                this.quiz.questions.push({
                    content: '',
                    answers: [
                        { content: '', isCorrect: false },
                        { content: '', isCorrect: true }
                    ]
                });
            },

            removeQuestion(index) {
                if (confirm('Are you sure you want to remove this question?')) {
                    this.quiz.questions.splice(index, 1);
                }
            },

            addAnswer(qIdx) {
                this.quiz.questions[qIdx].answers.push({
                    content: '',
                    isCorrect: false
                });
            },

            removeAnswer(qIdx, aIdx) {
                if (this.quiz.questions[qIdx].answers.length > 1) {
                    this.quiz.questions[qIdx].answers.splice(aIdx, 1);
                } else {
                    alert("A question must have at least one answer.");
                }
            },

            async saveFullQuiz() {
                // Validate cơ bản
                if (!this.quiz.title.trim()) return alert('Please enter quiz title');
                if (this.quiz.questions.length === 0) return alert('Please add at least one question');

                try {
                    const response = await fetch(`/admin/api/quiz/${this.quiz.id}/full-update`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(this.quiz)
                    });

                    if (response.ok) {
                        alert('Quiz updated successfully!');
                        window.location.href = '/admin/quiz';
                    } else {
                        const errorData = await response.json();
                        alert('Update failed: ' + (errorData.message || 'Unknown error'));
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('An error occurred while saving.');
                }
            }
        }
    }
</script>

</html>
