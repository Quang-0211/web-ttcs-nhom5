<!DOCTYPE html>
<html th:fragment="content" xmlns:th="http://www.thymeleaf.org">
<div class="flex-1 min-h-0 min-w-0 overflow-y-auto p-6 flex flex-col gap-6">
    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8 flex-1 flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-extrabold text-gray-800">Quiz Management</h1>
            <button @click="showCreateModal = true" class="px-6 py-3 bg-blue-500 text-white font-bold rounded-xl hover:bg-blue-600 transition">
                <i class="fa fa-plus mr-2"></i>Create Quiz
            </button>
        </div>

        <div class="flex-1 overflow-y-auto">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" x-data="quizList()" x-init="loadQuizzes()">
                <template x-for="quiz in quizzes" :key="quiz.id">
                    <div class="bg-gray-50 rounded-2xl p-6 border border-gray-200 hover:border-blue-300 transition">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-lg font-extrabold text-gray-800" x-text="quiz.title"></h3>
                            <div class="flex gap-2">
                                <button @click="editQuiz(quiz)" class="text-blue-500 hover:text-blue-700">
                                    <i class="fa fa-edit"></i>
                                </button>
                                <button @click="deleteQuiz(quiz.id)" class="text-red-500 hover:text-red-700">
                                    <i class="fa fa-trash"></i>
                                </button>
                            </div>
                        </div>
                        <p class="text-gray-600 text-sm mb-4" x-text="quiz.description"></p>
                        <div class="flex justify-between items-center text-xs text-gray-500">
                            <span x-text="quiz.category ? quiz.category.name : 'No category'"></span>
                            <span x-text="formatDate(quiz.created_at)"></span>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>
</div>

<!-- Create/Edit Modal -->
<div x-show="showCreateModal || showEditModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
     x-cloak @keydown.escape.window="showCreateModal = false; showEditModal = false">
    <div class="bg-white rounded-3xl p-8 w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-extrabold text-gray-800" x-text="showEditModal ? 'Edit Quiz' : 'Create Quiz'"></h2>
            <button @click="showCreateModal = false; showEditModal = false" class="text-gray-400 hover:text-gray-600">
                <i class="fa fa-times"></i>
            </button>
        </div>

        <form @submit.prevent="saveQuiz()">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Title</label>
                    <input x-model="currentQuiz.title" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500" required>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Description</label>
                    <textarea x-model="currentQuiz.description" rows="3" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Category</label>
                    <select x-model="currentQuiz.category.id" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                        <option value="">Select Category</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                    </select>
                </div>
            </div>

            <div class="flex justify-end gap-3 mt-6">
                <button type="button" @click="showCreateModal = false; showEditModal = false" class="px-6 py-3 border border-gray-300 text-gray-700 font-bold rounded-xl hover:bg-gray-50">
                    Cancel
                </button>
                <button type="submit" class="px-6 py-3 bg-blue-500 text-white font-bold rounded-xl hover:bg-blue-600">
                    <span x-text="showEditModal ? 'Update' : 'Create'"></span>
                </button>
            </div>
        </form>
    </div>
</div>

<script>
function quizList() {
    return {
        quizzes: [],
        showCreateModal: false,
        showEditModal: false,
        currentQuiz: { title: '', description: '', category: { id: '' } },

        loadQuizzes() {
            fetch('/admin/api/quiz')
                .then(res => res.json())
                .then(data => this.quizzes = data)
                .catch(err => console.error(err));
        },

        saveQuiz() {
            const method = this.currentQuiz.id ? 'PUT' : 'POST';
            const url = this.currentQuiz.id ? `/admin/api/quiz/${this.currentQuiz.id}` : '/admin/api/quiz';

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(this.currentQuiz)
            })
            .then(res => res.json())
            .then(() => {
                this.loadQuizzes();
                this.showCreateModal = false;
                this.showEditModal = false;
                this.resetForm();
            })
            .catch(err => console.error(err));
        },

        editQuiz(quiz) {
            this.currentQuiz = { ...quiz };
            this.showEditModal = true;
        },

        deleteQuiz(id) {
            if (confirm('Are you sure you want to delete this quiz?')) {
                fetch(`/admin/api/quiz/${id}`, { method: 'DELETE' })
                    .then(() => this.loadQuizzes())
                    .catch(err => console.error(err));
            }
        },

        resetForm() {
            this.currentQuiz = { title: '', description: '', category: { id: '' } };
        },

        formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString();
        }
    }
}
</script>
</html>
