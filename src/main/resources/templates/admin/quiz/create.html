<!DOCTYPE html>
<html th:fragment="content" xmlns:th="http://www.thymeleaf.org">
<div class="flex-1 min-h-0 min-w-0 overflow-y-auto p-6 flex flex-col gap-6">
    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8 flex-1 flex flex-col">
        <h1 class="text-2xl font-extrabold text-gray-800 mb-8">Create New Quiz</h1>

        <div x-data="quizCreator()" @submit.prevent="saveFullQuiz()" class="flex flex-col gap-8">
            <!-- Quiz Details Section -->
            <div class="border-b border-gray-200 pb-8">
                <h2 class="text-lg font-extrabold text-gray-700 mb-4">Quiz Information</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Title *</label>
                        <input x-model="quiz.title" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Category</label>
                        <select x-model="quiz.categoryId" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                            <option value="">Select Category</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                        </select>
                    </div>
                </div>
                <div class="mt-6">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Description</label>
                    <textarea x-model="quiz.description" rows="3" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500"></textarea>
                </div>
            </div>

            <!-- Questions Section -->
            <div class="border-b border-gray-200 pb-8">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-extrabold text-gray-700">Questions</h2>
                    <button type="button" @click="addQuestion()" class="px-4 py-2 bg-green-500 text-white font-bold rounded-lg hover:bg-green-600">
                        <i class="fa fa-plus mr-2"></i>Add Question
                    </button>
                </div>

                <template x-for="(question, qIndex) in quiz.questions" :key="qIndex">
                    <div class="bg-gray-50 p-6 rounded-xl mb-6 border border-gray-200">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="font-bold text-gray-700">Question <span x-text="qIndex + 1"></span></h3>
                            <button type="button" @click="removeQuestion(qIndex)" class="text-red-500 hover:text-red-700">
                                <i class="fa fa-trash"></i>
                            </button>
                        </div>

                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-2">Question Text *</label>
                                <textarea x-model="question.content" rows="2" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500" required></textarea>
                            </div>

                            <!-- Answers for this question -->
                            <div>
                                <div class="flex justify-between items-center mb-3">
                                    <label class="block text-sm font-bold text-gray-700">Answers</label>
                                    <button type="button" @click="addAnswer(qIndex)" class="px-3 py-1 bg-blue-500 text-white text-sm font-bold rounded-lg hover:bg-blue-600">
                                        <i class="fa fa-plus mr-1"></i>Add Answer
                                    </button>
                                </div>

                                <template x-for="(answer, aIndex) in question.answers" :key="aIndex">
                                    <div class="flex gap-3 mb-3 p-4 bg-white rounded-lg border border-gray-300">
                                        <div class="flex-1">
                                            <input x-model="answer.content" type="text" placeholder="Answer text" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:border-blue-500" required>
                                        </div>
                                        <div class="flex items-center gap-2">
                                            <label class="flex items-center gap-2 cursor-pointer">
                                                <input type="checkbox" x-model="answer.isCorrect" class="w-5 h-5">
                                                <span class="text-sm font-medium">Correct</span>
                                            </label>
                                        </div>
                                        <button type="button" @click="removeAnswer(qIndex, aIndex)" class="px-3 py-2 text-red-500 hover:text-red-700 hover:bg-red-50 rounded-lg">
                                            <i class="fa fa-trash"></i>
                                        </button>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Action Buttons -->
            <div class="flex justify-end gap-3">
                <a href="/admin/quiz" class="px-6 py-3 border border-gray-300 text-gray-700 font-bold rounded-xl hover:bg-gray-50">
                    Cancel
                </a>
                <button type="button" @click="saveFullQuiz()" class="px-6 py-3 bg-blue-500 text-white font-bold rounded-xl hover:bg-blue-600">
                    <i class="fa fa-save mr-2"></i>Save Quiz
                </button>
            </div>
        </div>
    </div>
</div>

<script>
function quizCreator() {
    return {
        quiz: {
            title: '',
            description: '',
            categoryId: '',
            questions: [
                {
                    content: '',
                    answers: [
                        { content: '', isCorrect: false },
                        { content: '', isCorrect: true }
                    ]
                }
            ]
        },

        addQuestion() {
            this.quiz.questions.push({
                content: '',
                answers: [
                    { content: '', isCorrect: false },
                    { content: '', isCorrect: true }
                ]
            });
        },

        removeQuestion(index) {
            this.quiz.questions.splice(index, 1);
        },

        addAnswer(questionIndex) {
            this.quiz.questions[questionIndex].answers.push({
                content: '',
                isCorrect: false
            });
        },

        removeAnswer(questionIndex, answerIndex) {
            this.quiz.questions[questionIndex].answers.splice(answerIndex, 1);
        },

        async saveFullQuiz() {
            if (!this.quiz.title.trim()) {
                alert('Please enter a quiz title');
                return;
            }

            if (this.quiz.questions.length === 0) {
                alert('Please add at least one question');
                return;
            }

            for (let i = 0; i < this.quiz.questions.length; i++) {
                const q = this.quiz.questions[i];
                if (!q.content.trim()) {
                    alert(`Question ${i + 1} is empty`);
                    return;
                }
                if (q.answers.length === 0) {
                    alert(`Question ${i + 1} has no answers`);
                    return;
                }
                if (q.answers.every(a => !a.content.trim())) {
                    alert(`Question ${i + 1} has no answer content`);
                    return;
                }
                if (!q.answers.some(a => a.isCorrect)) {
                    alert(`Question ${i + 1} has no correct answer`);
                    return;
                }
            }

            try {
                // Create quiz
                const quizPayload = {
                    title: this.quiz.title,
                    description: this.quiz.description,
                    category: this.quiz.categoryId ? { id: this.quiz.categoryId } : null
                };

                const quizRes = await fetch('/admin/api/quiz', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(quizPayload)
                });

                const savedQuiz = await quizRes.json();

                // Create questions and answers
                for (let i = 0; i < this.quiz.questions.length; i++) {
                    const qData = this.quiz.questions[i];
                    const questionPayload = {
                        content: qData.content,
                        questionType: 'multiple_choice',
                        questionOrder: i,
                        quiz: { id: savedQuiz.id }
                    };

                    const qRes = await fetch('/admin/api/quiz/questions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(questionPayload)
                    });

                    const savedQuestion = await qRes.json();

                    // Create answers
                    for (let j = 0; j < qData.answers.length; j++) {
                        const aData = qData.answers[j];
                        const answerPayload = {
                            content: aData.content,
                            isCorrect: aData.isCorrect,
                            orderIndex: j,
                            question: { id: savedQuestion.id }
                        };

                        await fetch('/admin/api/quiz/answers', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(answerPayload)
                        });
                    }
                }

                alert('Quiz created successfully!');
                window.location.href = '/admin/quiz';
            } catch (error) {
                console.error('Error:', error);
                alert('Error creating quiz');
            }
        }
    }
}
</script>
</html>
