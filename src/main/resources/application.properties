pring.application.name=webstudyenglish
spring.datasource.url=jdbc:mysql://localhost:3306/ttcs
spring.datasource.username=root
spring.datasource.password=Quang@0211
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate (JPA)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

#thymeleaf
#cap nhat giao dien khong can chay lai app
spring.thymeleaf.cache=false 
#khai bao noi chua ui / cac trang thy
spring.thymeleaf.prefix=classpath:/templates/
# mac dinh se tim file .html
spring.thymeleaf.suffix=.html

# MinIO configuration
minio.url=${MINIO_URL:http://minio:9000}
minio.public.url=${MINIO_PUBLIC_URL:http://localhost:9000}
minio.access.key=${MINIO_ROOT_USER:admin}
minio.secret.key=${MINIO_ROOT_PASSWORD:password}
minio.bucket.name=${MINIO_BUCKET_NAME:english-study}